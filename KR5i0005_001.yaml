front:
  text: 太上玄元道德經解太上道德經解序夫至人能爲至文至文卽寓至理維我太上至哉人乎伏讀尊經至哉文乎而解人不易索正恐至理之終晦也乃或有謁殿而陳曰神寶道德經自漢迄今名公鉅卿文人學士注釋累數百餘家編在道藏各抒所見均爲尊經之補雖樹論不同而未始不羽翼乎道統也余曰然至理至文必須至解諸家之解亦云解矣而非至也解其所解尙非道德尊經之本解也卽非吾之所謂至解也一日玉淸内相孚佑帝君來訪余袖出尊經注釋余披而細閱之知爲八洞仙祖闡揚奥旨不離乎道不泥乎道就文解意淺近無非高深俾千萬世後能領畧此尊經者以之爲已則順而祥以之爲人則愛而公以之爲天下國家無所處而不當而玄綱仙譜卒亦莫能踰越其範圍其解乃至解也以至文而得至解斯至理不終晦而至人日益尊吾旣佩服乎至文吾尤愛慕乎至解也猶憶曩時與呂帝同訂天經攺訛正誤筆削俱出呂帝手而余第總其成固知呂帝誠屬仙才而今又閱羣才之注則信乎仙才之筆非塵凡之所得比並而至文賴之以明至理緣之以發洩也九天開化司祿文昌敬序太上道德經解序嘗見世間暴棄者流其於邃深奥秘之言動云不求深解又曰吾以不解解之如此等輩譬甘坐於幽暗中而不求見天日之光者也然或自騁管見解其所解究非作者之所謂解豈遂許其能羽翼經傳也乎則甚矣至文之必需至解也恭惟神寶大天尊道德尊經凡五千言由漢唐以來上自公卿大夫下逮文人學士注者不一家而於尊經之本諦有牽扯内功離而去之者有拘文牽義泥而執之者有瑕瑜互見者有顯晦各半者皆不獲見全璧近日遊紫雲觀得見同班八洞仙祖依至理以闡經按章逐句無字不晰無文不貫絶不作一奇異語而太上當年作經之本義於是乎昭然若揭世人能本此注以體此經則以之爲已爲人順而祥愛而公矣以之爲天下國家亦何所處而不當哉如此者斯謂之正解斯謂之妙解亦斯謂之至解也自有至文以來其不可無是至解也夫
