body:
  text: 大羅班首同袍道弟蘇朗敬序太上道德經解序記有之作者之謂聖述者之謂明固也而吾謂作不足以詒千萬世法非聖也述不足以迪千萬世心非明也則甚矣作固難述尤難也惟我神寶太上當周季出函谷關關尹知爲異人懇著道德經凡五千言分爲八十一篇或長言之或短咏之所爲正心誠意之功修齊治平之略罔弗備具非專爲黃冠者立論也第其後申韓之徒有竊其說而以刑名法術治世者其究流於刻薄寡恩後世病申韓因而病之嗟乎我太上道德尊經昭如日月曾見有刻薄寡恩之說而著於篇帙也哉是此經不顯於天下後世者述者之無人也雖由漢迄明注尊經者不無百家而或泥於經而注之或離於經而注之非牽强而扭合卽附和而雷同其於我太上經論本旨絶少脗合則亦安頼是述乎我八祖恐人心之終蒙將永晦太上之至道一日偶集碧雲洞中相與合注經解注成潄口而捧讀之直如從幽暗中出忽見天淸日朗茅塞頓除不鑿奇怪不涉隱僻就文解意無注非中而太上當年著經之意於是乎昭揭此而尙不謂述者之明乎前有述者可弗論矣後有述者蔑以加矣是則不有太上之作無以開八祖之述也抑不有八祖之述又曷以闡太上之作哉如太上斯可以作亦惟如八祖斯可以述也夫玉樞右宰宏教眞君柳守元敬序太上道德經解題詞曩者八洞仙祖合注此經予曾題誌數言今門弟子將孚佑上帝闡義合而刻之歸入集中洵玄門之至寶也我帝師於朝禮期外恒詣太上宮聽法談玄恩賜坐論領契最深故此經之旨得仙注而始明得我孚佑帝師之闡義而益明非如世解尋章摘句又或多牽引附會者之可比也道德經本如太極統會萬天各隨境地示現不同所謂仁者見仁智者見智使人因其分量而自爲會入予於此闡義合注亦復云爾宏教弟子柳守元熏沐題詞太上道德經讚唐肅宗皇帝御製晝見殊相浮空浮色道釋人天作禮瞻奉申命藻繪示諸郡國唐憲宗皇帝御製大道之祖上德之母王者之師生民之父施教中華禮傳尼父西出函關化胡成佛惟天之覆萬物並育宋眞宗皇帝御製大哉混元超乎形氣先天而生後天五千玄文立教垂世萬劫常存道尊德貴宋仁宗皇帝御製大哉至道無爲自然劫終劫始先地先天含光默默永劫綿綿東訓尼父西化金仙百王取則屢聖攸傳萬教之祖玄之又玄明太祖皇帝御製心淵靜而莫測志無極而何量恍惚其精而密恍惚其智而長宜乎千古聖人務晦短而云長
