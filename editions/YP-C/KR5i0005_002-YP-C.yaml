body:
  text: 孚佑上帝全經闡義八洞仙祖分章合注體道章第一道元始一炁虛无自然可道非常道道本無言擬議便非名長飬萬物不可知識可名非常名愈探愈深愈執愈失正陽帝君注曰此道字在孔子言則爲後天中庸云道之大原出於天是有天而後有道非後天而何若以太上言則道字乃先天之道矣惟有道而後有天所謂道生天地是也故是經開端便云道若可道非常道也可道卽後天之道非常者如著在一邊就在一邊不能渾蓋包羅若大道則不可道也惟不可道道斯常周而名亦如之名卽仁義禮智之名其生此仁義禮智者道也謂之仁謂之義謂之禮與智便落後天而仁不能通乎義禮不能通乎智是所以無常名也而所以仁所以義所以禮與智則不可名其不可名者道而已矣無蕩蕩難名民無得稱名天地之始純亦不已先乎覆載有太極分眞强名日道名萬物之母降本流末飬育羣生故常無欲以觀其妙隱顯莫測無心運化常有欲以觀其徼守中抱一有意操持又曰無字一讀無卽所謂無極也未有天地先有此道道麗於無非天地之始乎有字一讀有卽所謂太極也惟有道而後萬物生無趨於有非萬物之母乎常無一讀無何以見妙無不終無微妙不可端倪故欲觀之蓋是無非蹈空之無也常有一讀徼者繳也盡也卽所謂遍也凡物有不能遍其不能遍者以所植之淺也惟道則常有有根於無從無生有有斯不窮不窮斯徼矣而要非迹象之有也故欲觀之此兩者執其兩端空空如也同出而異名一分造化心起經綸同謂之玄盡性至命體用一源玄之又玄形神俱妙無中生有眾妙之門悟由此入妙用難量又曰兩卽有無之兩無此道也有此道也謂之同出而或以無名或以有名名則異矣玄者深遠無極之所出有入無道之神妙若此欲不謂之玄也能乎然第謂之玄則猶可以迹象求也毛輶有倫是也至玄之又玄則鮮所測度所謂無聲無臭是也非至而何然又不終於無眾有皆從此化化生生故曰眾妙之門飬身章第二天下皆知美之爲美自揚已美使彰顯也斯惡已有危亡也皆知善之爲善有功名也斯不善已人所爭也故有無相生無必生有有必歸無難易相成先難後獲見易爲難長短相形道本無形自相長短高下相傾天旋地轉安得高下音聲相和一風萬籟所鳴皆應前後相隨往古卽今來今卽古正陽帝君注曰大道不滯形迹不分畛域不落意見渾渾淪淪固無所爲惡並無所爲美固無所爲不善並無所爲善故舉有無難易長短等一切渾於不見省卻多少牽扯煩擾天下人不知此中妙諦知美則以爲美殊不知別有不美者存知善則以爲善殊不知別有不善者在相形之下遂生出有無等許多弊竇來何如大道不知之爲得也是以聖人處無爲之事恭已而治貴乎自然行不言之教天何言哉道寓於物又曰爲亦事也聖人當事而行初無爲之之心行所無事是也當言而言亦無言之之心四時行焉是也故曰處無爲之事行不言之教萬物作焉而不辭忘物生而不有忘形爲而不恃忘情功成而弗居忘其所自又曰作興起也萬物於我待作書曰作新民御世者所不辭也然雖不辭而實不有不恃不居夫惟弗居緣空慮絕是以不去眞一常在又曰此卽顏子無伐無施之謂總是理會得無字親切精妙故耳聖人旣弗居功彼萬物曰遷善而弗知矣又何去之有哉安民章第三不尙賢德聖棄智使民不爭大公無我不貴難得之貨伯牙棄利使民不爲盜戒得勸賢不見可欲非禮勿視使心不亂轉物應機是以聖人之治修身爲本虛其心遣欲全心實其腹直飬全命弱其志致柔全神强其骨保精全形正陽帝君注曰聖人之治總是講的箇淡泊無爲所以賢不尙貨不貴欲不見胥天下而渾之心者神明之宰自是要虛而腹則何以要實蓋腹者心所宅也宅弗安則天君亂故虛心而實腹若志則腎所藏也而骨則爲腎之餘志妄動則强而肆欲骨斯以痿聖人知此故弱其志以强其骨常使民無知無欲返樸守湻使夫知者不敢爲也絜矩從心無假造作爲無爲寂然不動則無不治感而遂通又曰民之多故總緣於有知有欲是以紛紛不靜惟常使人知欲盡冺則共遊渾噩浩蕩之天而天下何不治之有其曰使夫知者不敢爲猶云智者無所用其謀而已矣無源章第四道冲而用之太虛同體或不盈謙不自滿淵兮似萬物之宗淵淵其淵萬物資始正陽帝君注曰道字一讀冲字一讀冲卽冲虛無欲之冲猶寂然之謂以寂然之道用之於世似乎不能盈滿宇宙而不知其淵淵其淵爲百川之所歸注是故萬物所宗主也曰似者亦謙言之耳挫其銳知止斂神解其紛不隨世變和其光退藏宥密同其塵混心於物湛兮似若存存神於無又曰人不知道立於無是以銳而求之紛而求之愈求而愈失其去道也遠是以聖人銳則挫之紛則解之道備於躬光輝自應遠耀而又不欲過於表著以凌物用是和其光焉以同其塵夫塵不解者也烏乎同之然不同則又矯異矣伯夷之清非至道也湛卽湛寂清靜之謂惟湛寂則道無弗存矣似亦謙辭吾不知誰之子一元旡上象帝之先超踪造化惟道獨尊又曰大道若此其果誰之子乎曰象帝之先夫帝已先矣又曰象帝之先則是先而又先卽上所謂玄之又玄是也虛用章第五天地不仁無心施化以萬物爲芻狗任其自然聖人不仁法天無爲以百姓爲芻狗順帝之則正陽帝君注曰不仁非謂天地聖人之不仁也言天地無心成化萬物皆沐其仁而天地究未嘗有心仁之芻狗祭物束草以作犧牲祀則奉之過則棄之言無所繫戀也天地之仁萬物亦若是焉而已矣聖人之於百姓也亦然天地之間塞乎兩間優優品類其猶槖籥乎空洞虛中太和充溢虛而不屈中通外直動而愈出應變無窮又曰槖籥不動則寂有感皆通天地之化如之蓋惟虛其中而不屈是以動而愈出耳多言數窮希言飬氣不如守中允執厥中又曰多言者卽煩稱博引之謂與其多言而不適於道何如守中之爲貴乎中卽允執厥中之中堯舜禹湯文王周公孔子皆根是以御世太上之言乃範圍曲成不過不遺之道而後世乃以老氏別之不亦謬哉成象章第六谷神不死虛靈不昧是謂玄牝一陰一陽正陽帝君注曰谷空其中可謂虛矣而猶有形之可見不得謂之神也惟道旣麗於虛而形迹胥冺此所以謂之神其曰不死者死者生之返物反而歸則曰死若道未見有生則亦安見有死故曰谷神不死牝以生物得名曰玄牝者生物而不見其生之之迹是牝而實玄矣玄牝之門念頭起處是謂天地根呼接天根吸接地基又曰玄雖麗於無而實陽神之所宅也牝似麗於有而卽陰神之所主也易曰一陰一陽之謂道然則玄牝之門非卽天地之所托始乎且陰陽無形無象而靜闔動闢正無非陰陽也門司闔闢故以是况之綿綿若存川流不息用之不勤虛間無用又曰綿綿者微而不絶之謂玄牝雖至微妙而端緒恰自絡繹不絶曰若存者不見其存而實有存者在勤訓窮此其所以用之而無終窮也韜光章第七天長地久萬古長春天地所以能長且久者陰陽變通以其不自生本無生滅故能長生不遷不變是以聖人後其身而身先自强不息外其身而身存成物成巳非以其無私耶天地同根故能成其私萬物同體正陽帝君注曰混沌鑿而兩儀奠何代不有天地何時不有天地亦何人何物不共戴此天地長莫長於此久莫久於此所以謂之天長地久而要之天地之所以能長久者以其生物而無生之之心不自生不自以爲生也故能長生萬物聖人本是以法天地不自有其身而後之不自愛其身而外之凡所先者皆人之事所自内者皆人之圖乃被其澤者無弗歸之是不先身而身自先矣外其身而身存矣要其所以致此者非以其無自私也耶夫惟無私故能成其私其私卽家齊國治天下平之謂王者以此爲私非無自私安克以成其私哉易性章第八上善若水性猶水也水善利萬物而不爭隨方逐圓不爲物忤處眾人之所惡以柔處卑居之靜夀故幾於道動微吉先其庶幾乎正陽帝君注曰道生德德生善善自德生故曰上善其曰若水者天一生水德運而爲善猶氣運而爲水也斯二者皆從無以趨於有是之取譬水利萬物而不與萬物爭功處眾人之所惡者惡訓忽言眾被其澤而忽而不知其澤此水之所以幾於道也而聖人之上善如之居善地利物無澤心善淵容物有養與善仁生物不盈言善信應物勿爽政善治化物清平事善能成物曲直動善時順物節度又曰居善地者言水自高趨下必有歸宿是也非善地而何心善淵者其源不窮其流不竭也非善淵而何與善仁者恩波廣沛放之皆凖是也非善仁而何言善信者導則流塞則止也非善信而何政善治者優渥田疇滋潤枯槁是也非善政而何事善能者可大可小可短可長是也非善能而何動善時者冬則堅凝春則泮釋是也非善時而何而上善與之同焉此節俱是雙關語雖祗言水而言上善在其中夫惟不爭卑以自牧故無尤有善無咎又曰此二語亦承上就水言水言水之所以備諸善者以其利萬物而不爭故也夫惟不爭故人皆不得而尤之矣不知上善者曷弗取鑒於水哉運夷章第九持而盈之不如其已天道虧盈而益謙揣而銳之不可長保地道變盈而流謙正陽帝君注曰大道惡盈當其盈而用力持之持之是也而不免於持之迹矣何如不盈之爲貴乎故曰不如其已大道戒銳當其銳而揣之揣之是也而不免於揣之心矣揣是强制之法踰時又將復然故曰不可長保金玉滿堂莫之能守鬼神害盈而福謙富貴而驕自貽其咎人道惡盈而好謙功成名遂身退君子有終天之道天地合德又曰金玉從富貴來世之享富貴擁金玉者何以不克終而守乎以其驕也驕緣於貪貪斯戀戀而不能去故凡抱遠識者於功成名遂之後則亟思退恐盈滿之爲害也則此箇退字是乃天之不盈之道漢留侯深知此道故終身不殆若越之文種吳之子胥其不知退者矣能爲章第十載營魄神凝志道不爲物遷抱一能無離二物混成如母𢹂嬰正陽帝君注曰魂魄人之所各麗於身者也易曰精氣爲物游魂爲變變者神也營訓止魂屬陽精而神焉魄屬陰雜而止焉是之謂營魄載者以魂載魄也魄載魂則魄爲政而嗜慾攻取將漓其性若魂載魄則魂爲政而虛靈不昧日見其天抱一者抱此不二不雜之眞能無離言神與一不可以須臾離也專氣致柔能嬰兒眞息悠悠如保赤子又曰氣卽形氣之氣而利害美惡分焉用之當則美而利失所當則惡而害與其逞之失所不如斂之使靜靜卽所謂專也且氣易隣於剛剛者必折齒剛是以易敝也故旣專而又致柔能嬰兒者赤子純一無僞安於不識不知之天聖人之安於無事則亦如之故曰能嬰兒卽大人不失赤子之心之謂也而生神章有云熙頤養嬰童者亦猶此意滌除玄覽能無疵不見不聞鑑明塵淨又曰滌除者掃除雜穢也聖人以無事爲福故於雜穢一切掃除而玄覽其高遠日躋上達則亦何非義之有故曰無疵愛民治國能無爲不動不變時清道泰又曰民自具愛之之道國自有治之之道聖人如其道以愛民亦如其道以治國所謂因物付物是也而何待於爲故曰能無爲天門開闔能無雌出有入無一而不二又曰天門者卽道之門也道之開闔動用自然範圍不過曲成不遺聖人亦先天而弗違後天而奉時已耳故曰能無雌雌者守一之謂卽君子而時中也明白四達能無知月皎冰融黜聰屏智又曰齊治均平明白四達是所謂知也然見以爲知則有知之心矣有知之心則與本然之知判而爲二且如鏡照物者也物來斯照而鏡初無照物之心故明白四達雖知而究未有知也故曰能無知生之畜之斡旋四德長養羣情生而不有道生萬物無所取有爲而不恃忘其所以默默昏昏長而不宰泰然無我一任天理是謂玄德行修德備脫體全眞又曰聖人體道於無所以生萬物畜萬物雖生而不自以爲有雖爲而不自恃雖長民而不自以爲宰是謂無聲無臭之道惟精惟一之道也非玄而何故曰玄德無用章第十一三十幅共一轂象月之數萬法歸心當其無有車之用轂虛其中所以運行埏埴以爲器陰陽往來而成造化當其無有器之用竭智盡物聖無全能鑿戸牖以爲室萬象森羅同乎一天當其無有室之用誰不由戸莫非斯道故有之以爲利得此父母之身爲用無之以爲用存我厥初無内無外西華帝君注曰太上教人總本箇無字立論是經八十一篇惟此章揭明其旨太上無量度人經濟皆在於此車有轂則必有輻轂一而已而輻則若是之多似寡不可以勝眾乃轂則無爲而輻則自爲旋轉是惟轂無爲而後有車之用也推之於器於室何獨不然用器者自煩而器之質固無爲也謀室者恒擾而室之象亦無爲也惟無斯有器之用室之用然則天下之凡有者不皆生於無乎故没箇有則不足以見無之大而没箇無又安克以入有之細所以末二語曰有之以爲利言有之固爲利矣而實無之以爲用言不得這箇無難以致用也無之時義大矣哉檢欲章第十二五色令人目盲志之所之其機在目五音令人耳聾和氣去心貪外喪内五味令人口爽嗜於道味忘其自然馳騁田獵令人心發狂猿馬不定無所歸宿難得之貨令人行妨志爲物轉貴乎守一是以聖人爲腹收視返聽樂在其中不爲目眼被色眩妄視泄精故去彼取此見性明心聞聲悟道西華帝君注曰目官司視耳官司聽口官司味儒家所謂氣質之性也聖人與人均共之第聖人任理而不放性眾人任欲以賊其性遂致眈夫五色五音五味而目於以盲矣耳於以聾矣口於以爽矣性固如是哉爽訓苦不特此也彼馳騁田獵以及難得之貨聖人亦未嘗不欲而當其際總以鏡花水月付之不致如庸眾之發狂而妨行也所以古之達人爲腹不爲目蓋最貪者目也然極意於貪而竟無處盛受若腹則多寡皆能受矣而究未有意於貪聖人深味此義故去彼取此彼此卽指腹目而言是緊接文法厭恥章第十三寵辱若驚福兮禍伏知足不辱貴大患若身愛能勿勞知止不殆西華帝君注曰此二語乃一篇之冒寵辱本是兩事身與患亦是兩端而開端輒曰寵辱若驚貴大患若身囫圇發此眞堪令人神聳何謂寵辱若驚如臨深淵如履薄冰寵爲下有辱何辱居寵不寵得之若驚富貴浮雲於我何有失之若驚患失防危可無大過是謂寵辱若驚坦蕩襟期無榮無辱又曰此節正解首句世人得寵而榮僉以寵爲上而不知寵實爲下矣所以然者寵乃辱之返亦卽辱之因從來受大辱者未有不自大寵來如是而寵不爲下乎故得之則恐辱連累以致失之亦恐辱有未離其値此心驚宜也然玩二若字亦虛狀之耳非眞驚也何謂貴大患若身安危累心得喪累性吾所以有大患者迷卻本來勞形自苦爲吾有身穢質不堪眾生被瞞及吾無身幻緣放下依然澄澈吾有何患天眞自然毋固毋我又曰凡人莫不私有其身卽莫不自謀其身而謀身之餘患不旋踵而至總因有此身適以患此身與其有身而患及身何如無身之爲愈也吾苟無身夫復何患故貴以身爲天下者心猶人君身同天下則可寄於天下百年過客萬物逆旅愛以身爲天下者明德親民修身爲本乃可以託於天下君子篤㳟而天下平又曰貴以身爲天下者非自貴其身乃以身爲天下之爲貴耳愛以身爲天下者自非愛其身乃以身爲天下之爲愛耳如此而尙不可以付神器哉故曰可以寄於天下托於天下贊玄章第十四視之不見名曰夷大象無形戒愼内睹聽之不聞名曰希大音希聲恐懼反聽摶之不得名曰微雖欲從之末由也已此三者不可致詰受之以靜神會意領故混而爲一囘風混合一以貫之西華帝君注曰希夷二字人多罕解故太上眞揭其旨曰曷爲夷視之不見是也曷爲希聽之不聞是也而微則人猶有能解者雖能解之鮮克象之故又以摶之不得示焉而要之夷卽希希卽微皆所謂玄也名雖異而義則同此所以混而爲一乎中庸之不睹不聞大雅之無聲無臭悉本於此其上不皦性靈無體其下不昧神化無方又曰皦明也與昧相對世人多明於顯而昧於微猶明於上而昧於下聖人本玄以立極不著於顯而立於微故曰其上則不皦而其下偏能不昧繩繩兮不可名絜矩之道民無能名復歸於無物復見天心存誠格物又曰繩繩言相續而不絶也雖不絶而欲以名之究莫得而名之則亦終歸於無物而已非玄而何是謂無狀之狀不見中親見無象之象親見中不見是謂恍惚渾渾淪淪杳㝠若存又曰旣曰無狀又曰之狀是又有狀矣而究竟何狀乎旣曰無象又曰之象是又有象矣而究竟何象乎若亡若存殆恍惚不可爲象矣其顔子瞻前在後之景象也耶迎之不見其首瞻之在前隨之不見其後忽然在後又曰眞玄恍惚若此所以當其前而迎之無首之可尋也自其後而踵之無迹之可見也斯不亦幽深微妙也哉執古之道以御今之有觀天之道執天之行能知古始靡不有初鮮克有終是謂道紀識得虛皇爲綱爲紀又曰古今二字勿泥物趨於有則爲今道立於無則爲古執古以御今猶云本無以御有非大道之綱紀而何顯德章第十五古之善爲士者遯世不見聖者能之微妙玄通知微之顯玄妙允中深不可識深藏若虛不可得聞西華帝君注曰微妙二語乃相連而及惟微斯妙妙斯玄玄斯通通斯深矣而尙可測乎古之善爲士者本領以此夫唯不可識惟精惟一故强爲之容能近取譬豫兮若冬涉川骨散寒瓊又曰夫古之士旣深不可測矣而終於不可測天下後世又曷以知有善士哉故不得已而强爲之容猶云强爲之表著也然雖表著而實則歛而不放所謂豫者戒而後動之謂言不得已而動其動之逡巡畏縮則有若當冬而渉川是卽履薄臨深之義猶兮若畏四鄰必愼其獨嚴乎指視又曰吐而仍茹曰猶有動則有言於不得已而言而囁嚅不敢輕出諸口若畏四鄰之或知也儼兮其若客毋不敬儼若思渙兮若冰之將釋太和充溢神悟心開敦兮其若樸羣居閉口不違如愚曠兮其若谷庶乎屢空億則屢中渾兮其若濁心與道冥和而不同又曰儼端肅也渙解悟也敦誠篤曠清虛也渾渾淪也善士之言動謹飭如此故其致躬端肅儼若客如見大賓也聲入心通解悟若冰之釋也機械變詐之全消敦厚而誠樸也虛中以應曠然若谷之有神也至渾兮若濁則亦和光同塵之意必曰眾皆濁而我獨清則是矯激之徒大道不尙乎此孰能濁以止靜之徐清清者濁之源孰能安以久動之徐生靜者動之基又曰嗜慾之流日趨於動而不復知有靜枯槁之眾泥煞此境而不復知有動夫孰能止其濁而從事於靜以徐復本然之清明乎亦孰能久於安而從事於動以徐得養生之道乎是蓋不著動靜一邊而有無相生之義益明矣保此道者不欲盈虛者實之本夫惟不盈冲虛無盡故能敝不新成潛雖伏矣本又曰天道虧盈鬼神害盈人道惡盈欹器之所以不容盈也故保此道者不欲盈夫不盈必至於敝矣而凡物之成者無有不敝之時况道欲其敝不尙乎新此所以甯敝而不取新成也卽此可悟退步之法歸根章第十六致虛極守靜篤虛以待之無爲之先西華帝君注曰虛無者道之體清靜者道之根世人只從實處著腳遂爾動作紛紜不已所以生出無限煩惱故要虛要靜然存一虛之心雖虛猶未虛也存一靜之見雖靜猶未靜也必致虛到極守靜到篤方謂之虛方成箇靜而實與動胥範圍於其中萬物並作吾以觀其復克已復禮天下歸仁又曰作興起也由虛而實由靜而動則萬物作焉大道所不辭也然極意於作將性根日漓鮮所歸宿是必由動返靜從實返空斯爲還原歸本故曰以觀其復夫物芸芸身外無爲各復歸其根姤觀月窟復見天根歸根曰靜止於至善無欲爲要又曰芸芸眾也此承上而深言之芸芸卽眾作之謂知其當復則當各歸其根矣譬如花卉之榮皆生於根及其搖落仍復歸於根耳歸根則斂尙不謂之靜乎靜曰復命返本還元復命曰常不凋不殘松栢靑靑知常曰明古今洞達湛然常寂不知常知者易悟昧者難行妄作㐫心生法亂氣散神離又曰人有性則必有命而此命卽道也易曰窮理盡性以至於命則此命字不得輕看混看常常存也惟復命而後可以湛然常存人患不知有常耳誠能知常則俯察仰觀窮幽極𣺌無弗洞澈不謂之明不可得也反是者昧於此常久之道而一意於動專力於實勢必多所妄作而不免於凶矣知常容大無不包容乃公細無不入公乃王能爲萬物主不逐四時凋王乃天能正德合神明天乃道一氣之始萬象之宗道乃久合眞與道何有終窮没身不殆雖天地覆墜吾不與之移又曰古之達人惟知常斯能渾蓋包涵一切渣滓盡歸消納乃有容矣有容則物我彼此不分畦畛而公大公無我帝王之度尙不謂之王乎天天之王也王王之天也道極於王正惟天爲大惟堯則之之謂非天而何而要其所以爲天者非他道也一切萬物均不能常惟道則久存而不敝是亦不息則久之謂聖人知此所以常奉此道没身而不怠也殆與怠同淳風章第十七太上下知有之無上至道萬物皆備其次親之譽之因不失親亦可宗也其次畏之懷刑思義其次侮之民免無恥西華帝君注曰太上卽最上之謂言御世者以道治天下冺聲色神教化潛移默運而其下於變時雍順帝之則則亦但知有之而已其次則由道而運爲德於是乎有禮樂制度雖亦善政善教其不逮最上者遠矣故被其澤者亦祗親之譽之而已降是而並無其德焉恃夫政文網在前能無畏乎道路以目能無侮乎故信不足不知有此理只爲太分明焉有不信自古有死無信不立又曰夫民至畏而且侮其不信治也明矣而要其所以不信者上不知道則無以取信於民若上誠信矣民斯從而信之故曰此上信之不足耳下焉有不信者乎猶兮其貴言默而識之言寡其尤功成事遂巍乎成功樂奏太平百姓皆謂我自然無爲而治帝力何有又曰離道者治如彼體道者治如此則亦可以見言爲天下後世法矣而猶訥訥不敢輕出諸口斯不亦貴此言也哉夫亦曰道本無形不尙迹象我運此道於無爲之中迨功成事遂使百姓皆謂我自然何快如之俗薄章第十八大道廢有仁義太樸旣散仁義乃行智慧出有大僞智慧聰明根塵業識西華帝君注曰仁義道之所分出也曷以言乎道廢而有仁義蓋道是箇渾淪的物事原無所爲仁義之名能以道御物終古只有一道那有箇甚麽仁義惟不能體此道而道廢於是乎從道之所分出者致力而天下始有仁義之名矣智慧本是美德曷以出而有僞蓋上古之人如無懷葛天渾渾噩噩不雕不琢用不著智慧則亦無所爲奸囘自後世智慧一生而善用之則成美不善用之則爲僞機械變詐皆從用智慧來六親不和有孝慈六欲牽順性愛命國家昏亂有忠臣身心紊亂誠意規中又曰唐虞二帝均號聖人而千秋萬世獨推舜爲大孝豈放勳獨不孝乎曰無瞽瞍也舜有瞽瞍孝斯以見商周摯旦均推良相而推忠者獨及逢比豈伊周之不忠乎曰無桀紂也逢比有桀紂而忠以名更推之詩小弁知孝子板蕩識忠臣斯義可昭雪矣還淳章第十九絶聖棄智忘神養虛民利百倍親賢樂利西華帝君注曰聖與智治民者專恃乎此而曷爲絶之棄之曰聖智皆不免於有爲有爲則粉飾太平之事滋而民多擾擾斯亂亂斯害矣夫何以利故必絶聖棄智而一以道運使民潛移默化而不自知利何如也故曰百倍絶仁棄義忘氣養神民復孝慈安時處順又曰孟子曰未有仁而遺其親卽未有義而虐其子仁義乃德之分見曷爲棄絶曰仁義雖是美德而三代下竊仁義之名離仁義之實者正復不少竊其名而離其實則父子之間有僞心焉僞則人倫冺矣故必絶棄仁義而一以道處之則孝慈多矣絶巧棄利忘形養氣盜賊無有方寸太平又曰巧以利用利以益民亦曷爲乎棄絶曰巧利興則爭欲得苟或弗獲勢必相率而盜民有盜心國不可爲矣故亦棄絶之方使民不致爲盜也此三者以爲文不足使其使然孰若自若故令有所屬應無所著見素抱樸清明在躬少私寡欲志氣如神又曰三者承上三項而言言此三者皆具文也具文烏足以治天下乎故令有所屬亦惟屬之於道已耳而道何在乎曰見素曰抱樸以及少私寡欲焉素乃白質未施章采樸乃璞玉未經雕琢皆所謂一也虛也卽所謂道也異俗章第二十絶學無憂無爲何慮西華帝君注曰聖人未嘗廢學而所學者惟道窮理盡性至命是皆聖人之學也後世之學不然渉獵詩書求工詞賦如陸機楊雄等輩號稱博學而因學轉滋憂虞是皆知學而不知所以學也與其學之弗臧何如弗學故曰絶學無憂唯之與阿一氣聚散相去幾何所過者化善之與惡一念動靜相去何若所存者神又曰唯謹諾也阿慢應也同出於聲而敬怠以判此善惡之小者也若云善惡則邪正分途矣然必過爲區别所謂休休有容者安在古人直以唯與阿善與惡相去究不甚遠而一味渾而忘之不使留形迹也人之所畏生死大事不可不畏畏天知命又曰至人待物恆寬律已恆密故夫人之所畏如畏天命畏大人畏聖言則亦從而畏之不敢高自位置也荒兮其未央哉沉滯聲色流浪生死又曰荒大也言立體如此豈不大哉其未有央乎眾人熙熙逐物情蕩如享太牢於道無味如登春臺縱慾無厭我獨泊兮其未兆虛靜待之如嬰兒之未孩但看嬰兒處胎時又曰眾人狃於所欲一得之便熙熙然如享太牢焉如登春臺焉而我獨淡泊爲懷全無欲之念萌於中兆卽萌也是其湛然無欲一如嬰兒之在襁褓尙未及於孩也夫孩童已純一無僞而嬰兒則更無僞矣故以是况之乘乘兮若無所歸豈解有心潛算計又曰乘乘者卽落落之謂言此心廓落不覊無離無著一若鮮所歸宿然眾人皆有餘不知戢歛獨我若遺惟恐失之我愚人之心也哉離種種邊名爲妙道沌沌兮昏昏默默又曰此以知言言眾逞其知識似若有餘而我獨冺然其若遺也我豈眞愚人之心也哉蓋不過沌沌渾淪而已不以才智聰明見也俗人昭昭的然日亡我獨若昏闇然日章俗人察察用心分别我獨悶悶何須彼此又曰惟其然故眾人羣恃其昭昭而我獨若昏眾人皆稱其察察而我獨悶悶忽兮其若海不滯方隅漂兮若無所止離諸邊徼眾人皆有以眾貴有爲以用我獨頑且鄙我貴無用之用我獨異於人道不遠人人遠道乎而貴食母養須藉母復歸命根又曰言我雖昏昏悶悶而性地光明正大忽兮有若海之能容漂兮其罔所窺測也眾人二句對上以能言言眾人恃其才力皆若有所建立而我獨常處於頑鄙也道者眾之母蓋道生天地天地生萬物而總歸本於道非母而何此我所以異於人而獨貴母也曰食者嬰兒無他注向只知食母之食達人之歸根於道母亦若是焉虛心章第二十一孔德之容大包六合惟道是從細入微塵玉華帝君注曰孔大也道無形象未見有容自運而爲德遂爾容納萬物人第知德之有容容而且大而不知皆歸本於道也故曰惟道是從道之爲物惟恍惟惚亘古無物了無人識惚兮恍兮似有如無其中有象若有非有恍兮惚兮若亡若存其中有物若無非無𥥆兮冥兮心與道合其中有精陰陽交會又曰德容旣根於道而道何在乎恍兮惚兮而已夫恍惚不幾無象而少物乎而要之雖惚兮恍焉象固藏於其中無象而有象也雖恍兮惚焉物固寓於其中無物而有物也由無象無物之先推之成象成物之始不見恍惚而又見𥥆冥矣𥥆㝠不猶是難窺測乎而其中之眞精雖不可窺測夫固已信之穩矣其精甚眞純一不雜其中有信眞實不虛又曰夫惟其精甚眞則其中之包羅涵養莫載莫破益以信大道之不我欺也自古及今萬劫常存無終無始其名不去人能𢎞道非道𢎞人以閱眾甫萬物始生皆禀於道吾何以知眾甫之然哉從道受氣以此視聽言動非道不然又曰不去猶云不朽古今皆有去時一世古則一世去世閱世而成古今所以古今皆有去時而道獨常存不去甫美也道惟常留斯以閱眾美而範圍之不過曲成之不遺也夫眾甫紛紛遍天地吾何以知眾甫之所以然哉以知此道而深信之不疑耳益謙章第二十二曲則全委曲周全枉則直大直若曲窪則盈謙下德歸弊則新晦極自明少則得易知簡能多則惑聞疑見殆是以聖人抱一爲天下式一矩眾繩玉華帝君注曰天下總是一箇理字要能體認如直與曲兩端羣知直是而曲非也殊不知任直之過反與萬物有妨惟曲則能通通斯和和則萬物在宥其成全者正無涯也枉者直之反旣枉矣亦安得直而不知木工之引繩取其直也究竟引之始直舍之則曲未見其常直也惟枉不見直而不直中總有箇理字作骨如父子相隱雖枉正可以處州里行蠻貊是爲不直之直其直固自多也水性就下窪下之地眾水所歸未有不盈者也新故相乘勢也常卽於新安見有新惟到敝時由敝以返新萬物成敗消長之理大類如是少則得者卽一以貫之之謂雖少而貫通常自得也苟厭少而騖多將荒唐滑稽之論皆得而惑之矣是一者介寂感之交主危微之界恍惚窈㝠無離無著而所謂曲全枉直六事皆從此一中分出故聖人獨抱此以爲天下法式焉不自見故明莫見乎隱不自是故彰莫顯乎微不自伐故有功無伐善功自歸不自矜故長無施勞能不危夫惟不爭故天下莫與之爭我尙自忘何况非我又曰聖人抱一如是可謂明矣而究不自以爲明也彼目能見物不能自見自見爲目則反不明故不自以爲明明斯遠也而由是不自以爲是人必是之人是之則明彰矣不自伐其功人必以功歸之功益著矣不自矜夸其長人必卽其長而欽之長愈永矣凡此不自見不自是不自伐不自矜是皆所謂不爭也夫惟不爭天下亦孰能與之爭哉漢高帝鴻門不與項爭而垓下遂無有與之爭者此類可推古之所謂曲則全者性不可窮豈虛言哉正非虛妄誠全而歸之歸本復初又曰通章主意原在首句故末亦單結言古之所謂曲則全者豈虛語哉無曲弗全内以全身外以全物皆全也欲全萬物而有不歸之於道卽有不歸之於曲也哉卽如人之一身五臟六腑以及四肢皆曲而是身賴以常全則曲而能全更瞭如矣虛無章第二十三希言自然妙音希聲玉華帝君注曰希言卽簡言之謂道重雌默以簡爲貴世人弗知此道而煩稱博引不適於中多致牽强非自然也惟聖人希言適合自然雖淡而愈旨也飄風不終朝狂則不久驟雨不終日躁則徒爲孰爲此者是誰主宰天地兩間而已天地尙不能久乾坤無非幻化而况於人乎法禁躁妄又曰自辰至巳曰終朝自旦至暮曰終日言夸鬬之徒牽强求合其言不可以取信譬之飄風驟雨不過陰陽一時亢伏之氣不終朝終日而旋止也夫此爲飄驟風雨者爲誰乃天地也天地亢伏之氣且不能久而况於人乎故從事於道者順理合轍道者同於道通乎物也德者同於德忘乎我也失者同於失齊得喪也同於道者道亦樂得之逍遙無累同於德者德亦樂得之隨在有得同於失者失亦樂得之順其自然信不足焉吾斯未信有不信焉因惑生疑又曰惟其然則道尙矣故從事於道者道則同於道德則同於德失則同於失同於道則樂得道矣同於德則樂得德矣卽不幸而同於失則亦道中之失耳故有所失則亦樂居此失也此卽某幸有過之意言道之可樂可貴如是而人乃疑之道根淺而信不足故也惟信不足益以不信矣苦恩章第二十四跂者不立躁進無功跨者不行欲速不達自見者不明不能晦德自是者不彰不能謙下自伐者無功不能克已自矜者不長不能含容玉華帝君注曰跂翹足也跨如跨馬之跨兩腿崩開之謂言足利於立腿利於行此其常也腿足之能事也苟或矜其足力而加之以跂雖立危矣焉能常立更或恃其腿力而加之以跨雖行艱矣焉能遠行此亦猶夫視而明者一自見則反不明學而彰者一自是則反不彰擁有功者一自伐則反不見功澤可長者一自矜則反不能長矣驕盈之害大類如是其於道也餘食贅行仁見爲仁智見爲智物或惡之念起是病不續是藥故有道者不處也不怕念起惟恐覺遲又曰由是以觀道尙平易不貴隱怪總以適中爲主所謂君子中庸也譬如飲食適可則作息自如多食是爲有餘而反傷脾胃矣更如行走以輕便爲快設使多帶重贅之物則身體不便而轉艱於攸往物或惡之者言此二事皆眾人之所惡有道之士則亦焉能取是哉象元章第二十五有物混成混沌開先先天地生萬化生乎身玉華帝君注曰此物字指道而言混渾也先天地生言先天地而有而天地卽生於其中也是卽道生天地之謂寂兮寥兮湛然常寂獨立而不改超然常存周行而不殆運化無窮可以爲天下母養育羣生又曰凡物有聲道無聲也常寂然焉凡物有形道無形也常寥然焉惟其寂寥故能獨立無所依附而未有天地之先及旣有天地之後彌綸布濩莫之變改周流於前古後今奉行者第見其善不見其殆此道所以爲天下之母也乎吾不知其名不可形容字之曰道因物立名强爲之名曰大道無邊大曰逝無著逝曰遠無盡遠曰反收拾歸來又曰渾沌太無道何所名乎吾不知其名也而第見萬物皆由之弗越則亦字之曰道而已又見天地皆生於其中萬物總無以加之大何如也則不得不强爲名之曰大道矣道旣大則未有不逝者逝者如斯亦同此意積新成故由故返新往者有來來者又往皆所謂逝也道旣逝矣而有不遠乎遠曰反者言道雖大而逝雖逝而遠苟能反而求之吾心則道卽在是何大且遠之有故道大太虛無象天大同乎無始地大同乎無終王亦大叅天兩地域中有四大而王居其一焉上無復色下無復淵靈地獨存玄之又玄人法地牧養品類效坤德也地法天容載萬物承天施也天法道生成宇宙助道化也道法自然清靜虛無因自然也又曰庸流昧於道本只知世上有三大曰天也地也王也而不知域中有四大焉苟由本以推之末由流而溯其原則王人雖大且必取法乎地地輿雖大且必取法乎天天可謂大無外矣而亦必取法乎道道雖大無外矣而作爲者非道自然者乃道也故道亦必法乎自然自然之道無形無聲無朕無爲不可以名者也名之曰道曰大猶是强而已矣重德章第二十六重爲輕根心爲萬物之宗靜爲躁君道爲一身之體玉華帝君注曰天下輕重之數靜躁之分夫人而知之也而輕必借麗於重躁必待鎭於靜則未之有知故直揭之曰重爲輕根言有重者鎭壓中央而以駕輕車便無顚覆之患非輕之根而何靜爲躁君言能主靜寂然不動而以應萬事始見感通之神非躁之君而何躁卽動也是以聖人終日行日行火候不離輜重時運河車雖有榮觀無所貪著燕處超然心超物外又曰聖人惟知此道所以終日行之而不離乎輜重以重爲輕根故也雖有榮觀言𤍠閙場中雖光榮足炫而本然清虛之體故自超然不亂以靜爲君故也奈何萬乘之主心君而以身輕天下戀有貪生輕則失臣輕動搖精躁則失君躁妄亂神又曰言道旣尙靜尙重如是世之人主所當奉若不違奈何撫有萬乘而以身輕天下也哉故君輕則遊豫逸樂無節鮮克勵精圖治臣庶知其不足以輔則望望然去之輕之故也不知道有重也夫君輕且失臣而况臣之躁乎臣躁則急功謀利而少協恭和衷之忱君知其不可以用則鞶帶以褫之者躁之故也不知道在靜也旣以責君而兼以勵臣君臣交勉於道嚴矣哉巧用章第二十七善行無轍迹以心知心善言無瑕讁以性覺性善計不籌䇿以神合神善閉無關鍵而不可開合神於無善結無繩約而不可解合無於道玉華帝君注曰車馬輪轅周行必留轍迹此物勢之必然者也而本道以行則不少留夫軌迹善行也繁稱博引矢口易招愆尤此興戎之所致戒也而準道以言則不予人以瑕讁焉善言也思前想後圖謀必事籌畫此人情之所必爾也而依道以計則自然中款無所用籌䇿也善計也推之於閉不用關鍵扄固而不可開非善閉而何充之於結無繩約而物朿不克以解非善結而何是皆所謂道也卽所謂道之自然也是以聖人常善救人視人猶已故無棄人均氣同體常善救物與物混成故無棄物隨機利物是謂襲明定能生慧又曰夫行善言善計善如是而尙不可以救人救物乎哉能救人則天下無棄人矣能救物則天下無棄物矣故曰聖人云云襲沿襲也相沿不絶之謂言庸流域於耳目物我之間恒分畦畛猶坐井觀天焉得爲明惟聖人視人猶已欲立立人且甯不立已必欲立人欲達達人亦甯不達已必欲達人心心相印息息相通如傳燈之相續不絶其明大矣遠矣不謂之襲明而何故善人者不善人之師見賢思齊不善人者善人之資而内自省不貴其師道無可學不愛其資心無可用又曰襲明如是是非善人也乎善人者不善之人所師以取法者也不善人者正善人所資以施教者也而究之人日遷善而弗知何人之力則亦安知有師之足貴乎道化自然及物而並非有心鼓舞振作於其中則亦安知有資之足愛乎故曰不貴其師不愛其資雖智大迷屏智如愚是謂要妙任運天然又曰聖人善救人物如是其智可謂大矣而體立於無爲用運於無心淡泊渾穆雖智猶如大迷是卽大智若愚之謂而道之所以爲道者要妙卽在乎此矣反樸章第二十八知其雄凝其神守其雌入炁穴爲天下谿萬脈歸元爲天下谿深妙常德不離造次於是顚沛於是復歸於嬰兒能受無用知其白養性守其黑保命爲天下式是法是則爲天下式節候常德不忒分毫不爽復歸於無極完此太虛知其榮心廣守其辱體胖爲天下谷空諸所有爲天下谷虛中常德乃足身外無餘復歸於樸太易無極樸散而爲器易有太極是生兩儀聖人用之知有此理則爲官長設教化人故大制不割混沌而無剖析玉華帝君注曰雄雌卽先後之謂雄居先雌居後也人情莫不爭先而恐後乃爭先者易蹶反不如後者之穩步焉聖人非不知其雄也而甯守其雌谿卽深谿之谿言聖人守後而不務先其德足以感孚天下天下歸之如眾流之趨深淵是爲天下之谿矣雖爲天下谿而聖人不以眾歸自矜也猶是抱常德不以離冲虛恬淡絶無嗜慾雖大人猶然赤子故曰復歸於嬰兒白黑卽明暗之義白其明也黑其暗也人情莫不尙明而恥暗乃尙明者察察多傷反不如暗者之韜晦焉聖人非不知其白也而甯守其黑式卽法式之式言聖人守暗而不務明其德足以爲範天下天下則之奉以爲式雖奉爲式而聖人不敢以自伐也猶是守常德而不忒冺聲色同寂寥不滯形象仍返本始故曰復歸於無極至於榮辱尤其較著者也人情莫不好榮而惡辱乃至於榮者辱旋及之反不如安辱者之自得也聖人非不知其榮也而甯守其辱謙冲善下虛而能受受而不有如天下之空谷然夫惟如天下之谷則無所不容無所不納常德於以足矣而究之有爲仍無爲也樸者性始之名性始無爲故曰復歸於樸樸無也復歸於樸是有不終有仍返於無矣迨樸㪚而爲器是無不終無復趨於有矣無者天地之始也有者萬物之母也譬如人君旣已建其有極又分設官長以會其極大制宰制也割割裂也君令臣共以此宰制天下而何割裂之有哉無爲章第二十九將欲取天下而爲之欲行此道吾見其不得已道本無爲玉華帝君注曰帝世之有天下揖讓得之非取之也四方風動黎民變之非上爲之也若將欲以力取天下而從而作爲於其間是爲失道已矣通不得已言二者皆弗得於道矣天下神器心之所居不可爲也爲有妄心卽驚其神爲者敗之爲傷自然執者失之執乖通變又曰天下大器也曰神言有神默相之是則神器之大擁此者皆當抱樸守雌不可以有爲也一侈志於爲則粉飾太平徒滋紛擾反以敗國一著意於執則拘虛膠固鮮所通變不惟得之適以失之矣故物或行或隨念茲在茲或噓或吹思無邪或强或羸善用其心或載或隳精思此理是以聖人去甚過猶不及去奢道常如此去泰道無不足又曰總之道尙自然故物或有翼之以行者或有步焉以隨者或呴而煖之或吹而寒之或益而强之或損而羸之而可栽者則或從而載也可傾者則或從而隳也雖應用不同要皆因物付物順其自然而已何所庸我之侈然恣肆而貪求之無厭也乎是故聖人甚則去之奢則去之而泰亦並去之也儉武章第三十以道佐人主者道與心合不以兵强天下善勝在於不爭其事好還歸根復命玉華帝君注曰治世有事本道發爲文德武功非所尙也且兵爲凶器淫佚之事上帝惡之苟或侈志於兵自使天下肝腦塗地則出乎爾者必反乎爾若齊之湣王楚之靈王秦之始皇梁之武帝皆獲殺身之禍故曰其事好還師之所處心兵所起荆棘生焉神狂心荒大軍之後情欲馳驅必有凶年氣神昏耗又曰此更推言兵强之害言終日用師則農業妨而田疇不治荆棘叢生不特此也殺氣過旺有傷天地之和則災祲流行運所必至大軍之後必有凶年固不卜而早定也故善者果而已定力所到不敢以取强忘我而已又曰果决也言善爲治者絶不談兵從不好强其於四方六合總以仁義化之禮樂綏之迨綏之不得化之逆命則不得已取决於一戰阪泉涿鹿之師是果之明徵也而究不敢恃以取强自詡用兵之如神也果而勿矜待之以靜果而勿伐默而守之果而勿驕存之以和果而不得已用之以虛果而勿强自然虛無又曰人特患無是果耳誠有是果則必能不自矜張不自誇伐不自驕盈間用其果皆出於勢不得已而初不自以爲强也物壯則老心爲物移是謂不道性爲心蔽不道早已永失眞道又曰善者用果而不尙强夫何以故蓋恃强則逞壯逞壯則易折大過之上六大壯之上六其明鑑也譬如物之發露太過精華難要於久灼灼之華早發者則必先萎此物壯之未有不老者也苟或只知强壯之足憑而不知老敗之將至則是昧乎盈虛消息之道矣是之謂不道不道之念其不可不早已也夫已止也息也偃武章第三十一夫佳兵者不祥之器以心勝物終莫能勝物或惡之爲物所誘故有道者不處不離生死而離生死孚佑帝君注曰戰危事也勇逸德也兵凶器也雖有佳兵實爲不祥故曰不祥之器且窮兵必妨農業多傷性命類干天地和氣凡物無不惡之是以有道者斷不以是爲得計而安以處之也是以君子居則貴左主柔用兵則貴右主剛兵者不祥之器凶器逆德非君子之器觸來勿與兢事過心清涼不得已而用之欲求合道乃不合道恬澹爲上常寂勝而不美求欲凝神神乃不凝而美之者用志不分乃凝於神是樂殺人用心一處無事不辦夫樂殺人者絶欲不可得志於天下矣凡百從儉故吉事尙左東木主生凶事尙右西金主殺偏將軍居左省心上將軍居右全神言居上勢則以喪禮處之若論此事如喪考妣殺人眾多六賊兵息三尸自焚以悲哀泣之心死神存戰勝則以喪禮處之孤光獨照又曰夫惟有道者不處佳兵所以君子居則尙左而用兵則尙右尙右者示不敢專制之意誠以兵爲不祥而非君子之器其間或用之者勢出於不得已也蓋其本道致治總以恬淡無欲爲上若兵之凶器則雖獲勝於人不可爲美而以此爲美者是以殺人爲樂矣如之何其可哉昔孟子語梁襄王曰不啫殺人者能一之樂殺人者宜乎難得志於天下也推而至於凡事之吉凶則吉居左而凶則居右矣是亦儀禮祥車纊車以分左右之義卽如行師將之偏者何反居左將之上者何反居右此其中有二義焉一則謙而不欲自尊大也一則退而不欲樂殺人也雖勇居上勢故甯右而毋左焉夫居上勢而處右則不見可忻惟見可憫是視兵勢之如喪也故卽以喪禮處之如秦穆夫人披髮登臺而請晉惠非以喪禮處之而何所以殺人眾多屍橫遍野目不忍見耳不忍聞此猶得竊欣其得志乎悲哀泣之而已所以君子於戰勝不以爲吉轉以爲凶而徹樂不懸食旨弗甘多以喪禮處之者良以兵固不祥之器也夫喪非不祥者乎以不祥之喪處不祥之兵禮也聖德章第三十二道常無名應化無方樸雖小至微天下不敢臣道爲萬化之君侯王若能守抱一萬物將自賓賓服從德孚佑帝君注曰首篇云可道非常道可名非常名以道不可以道名也故此章直曰道常無名然終於無名則天下又安知有道乎是有樸在不可名而猶可名者也夫所謂樸者何性也性之爲體寂焉𣺌焉則亦似乎小矣而天下究不得而域之所謂不敢臣也彼智者可以慧使勇者可以力使藝者可以才使皆可得而臣之若樸則有而仍無無而又有恍兮惚兮則亦奚從而臣之哉然雖不可臣而樸則卷之藏於密放之則可彌六合者也侯王若能守此樸而不攺則本是以默運潛移無爲成化萬物皆自賓服矣天地相合乾坤交感罷以降甘露一點落黃庭人莫之令而自均一氣和太和又曰露者天地和氣之所積而流也潤於有形而實施於無聲人君以樸理天下成於有象而實本於無爲其與天地之降甘露不爽累黍故物被無聲之露莫之令而自榮則民沐無爲之化亦莫之令而自均也始制有名立法制度名亦旣有因器制名夫亦將知止淡然自足知止所以不殆知止而後有定又曰始制卽所謂樸也言道本無名而强爲名之以樸則是始制有名矣夫道旣有名勢必日趨於有日趨於有則已與物勢將從風而靡若水之狂瀾無所底止而極意於有全失夫無矣失無則失樸矣故曰名而無則道隱名旣有矣則亦當知止以復歸於無也誠能知止將還原反樸而何殆之有哉譬道之在天下心之在我猶川谷之於江海也在止於善又曰更取而譬之道在天下萬物從而歸之猶江海無意於眾流而川谷之水必從而注之也辨德章第三十三知人者智外觀其物物無其物自知者明内觀其心心無其物勝人者有力勇敢於道而化自成自勝者强眞積力久孚佑帝君注曰智者分別之謂不知人則是非邪正將何以辨是亦已之累德則知人尙矣然人苦不自知不自知而徒知人尤累德也故知人者第謂之智而自知斯謂之明也猶之恃我勇力以取勝於人僅可謂之有力耳終不若君子尙義不尙勇力而敬勝義勝以自勝者斯謂之强焉知足者富安貧樂道强行者有志有志者事竟成不失其所者久觀其所以命基愈固死而不亡者夀妄滅照存又曰人情多不知足得一冀十得十冀百得百冀千得千冀萬迨强求之終不可得久併其得者而轉失之貪之爲害故也誠能知足則不求富而富矣衞公子荆可風也人類不能自强遇艱深卓絶之事便推諉不敢向前無志故也苟能勉强以行仁義則謂之有志矣所者何性也卽樸也吾心之所以爲心也離而去之無以爲心卽無以爲性亦卽無以爲生夫安能久惟常抱此渾樸之物葆而不失其所則雖形體或壞而精英自足千古不亦厯久而弗衰乎夫體道能厯夫久則入水不溺入火不焚可以無死卽或死之而腐壞者軀殼吾之精氣神終未之亡也譬如蟬之脫殼蛇之脫蛻其若死者殼與蛻也而蟬之爲蟬蛇之爲蛇究未嘗亡也夫旣云死矣而仍不亡脫殼尸解者流也不生亦不滅是也非夀而何任成章第三十四大道氾兮充滿八極其可左右取之逢源孚佑帝君注曰氾水中之高地也道立於高又極於清眾濁環繞有似於江之氾故以是况之惟道居高而下視則以一本散爲萬物而左宜右有無非道所充滿也萬物恃之以生而不辭大道無生不免於生功成不名有實無所得又曰道可左右如是其爲萬物之母可知旣爲物母則物皆恃之以生母能生物則母亦任之而何辭第道尙虛無如是生焉弗辭勢將日趨於有而不可道者可道矣不可名者可名矣道固如是乎而不知功雖成不名有也生者自生道猶是恍惚寂寥而已彼滯於無者類辭物而不生滯於有者類生物而居功皆不可以爲道愛養萬物而不爲主道能育物忘其所自故常無欲常守眞空可名於小語小含宏萬物歸焉而不知主人能虛心道自歸之可名於大何所不容是以聖人終不爲大粟中藏世界故能成其大誠不可量又曰道惟不辭不有故於萬物雖愛養之而不自爲主其不自主者以湛然無欲故也惟常無欲是自居於小矣道雖不自以爲主而萬物或知而歸之雖大未云大也惟萬物受其陶鑄而不知誰氏之力耕田鑿井帝力何有於我是日遷善而究不知有主皞皞熙熙大何如也雖不名大而大之名必歸之究之聖人終不敢自以爲大也惟不自以爲大而大實有所難揜而無容辭者故曰能成其大仁德章第三十五執大象天下往允執常靜天地悉歸孚佑帝君注曰象道也大象卽大道也道本無象而象以名之是爲無象之象故曰大象執之者奉持不失言奉道以往行之天下可也往而不害道無鬼神獨往獨來安平泰心安性平性平神泰又曰夫往者利害之交也只求利往而有妨於物非往之善者也惟奉道以往而於物各無所害萬物得所可謂安矣萬物洽情可謂平矣四方風動可謂泰矣非執大象以往而能如是乎樂與餌從心不踰矩過客止邪念自絶道之出口淡而有味淡乎其無味無味之味視之不足見道無形聽之不足聞道無聲用之不可旣道無盡又曰道之入人淪肌浹髓非徒悅其耳目口體巳也苟第悅其耳目口體則猶之樂與餌矣彼作樂以娛耳目作餌以頤口體客過之悅其聲色臭味未有不從而止車者迨樂闋而餌盡則又終巳不顧矣若道之出口則淡焉其無味不若有味之餌也視之則不見聽之則不聞不若有聲有色之樂也而推而用之擴而往之則有取之不盡用之不窮者道之大何如乎欲不名之以大象得乎微明章第三十六將欲噏之必固張之一闔一闢將欲弱之必固强之一動一靜將欲廢之必固興之若存若亡將欲奪之必固與之舍用得宜是謂微明幾微先兆孚佑帝君注曰噏合也張開也將欲噏則先張之必張而始能噏也以此推焉將欲弱其兵必先驕其心如晉文退舍以驕子玉是也强驕也且將欲廢其事必先示以興將欲奪其地必先與以賄如晉獻賂虞以取虞地是也以上四者有似管仲孫武之謀曾大道而顧若是第仲武任術君子任理任術則流於詭譎任理不失其光大此所謂哲人知幾知幾其神之謂是謂微明者明之深而微也八之字俱指物言柔勝剛弱勝强柔弱常和用剛必敗又曰齒剛易折舌柔長存聖人之所以欲噏先張欲弱先强欲廢先興欲奪先與者以柔能勝剛弱能勝强故也魚不可脫於淵心不離乎道國之利器不可以示人可與立不可與權又曰魚以水爲宮亦依水爲勢當其浮沉於淵鼓鬣揚鬐雖强有力者莫之能勝魚固居剛矣迨脫淵而陸則失其所恃而生殺一聽乎人不又剛卽於柔乎是故聖人無時無處不出於柔而天下之剛者卒莫能勝此大明之終始而國之利器也國之利器惟有道者自喻之而不可出而喻諸人也爲政章第三十七道常無爲無爲爲道妙而無不爲有作是根基孚佑帝君注曰無爲者道也然終於無爲則宇内亦安知有道故無爲者其體而有爲者其用究竟爲之而仍無所爲故謂之常無爲也卽謂之無不爲也可侯王若能守心主於道萬物將自化萬化自然化而欲作一念欲起吾將鎭之以無名之樸要知眞一處當使六用廢又曰是無爲者可卷可放若現若隱或卽或離非色非聲冲漠無朕極矣然爲侯王者若能守此無爲則德運於無形功積於弗知萬物將資焉而自化矣第物化而我不與之俱化斯不失無爲之體每見世主因物振興遂亦從風而靡狃於已然冀其未然忘其本然流弊鮮所底止惟當其化而欲作之時終以無名之樸鎭之庶乎有以爲者仍是無以爲也是之謂無爲無名之樸亦將不欲我好靜而民自正不欲以靜知者不敢爲天下將自正爲無爲則無不治又曰夫無名之樸能鎭有爲之化樸其不可欲也耶然存一欲樸之心則仍趨於有矣故樸雖美而初不以爲美而欲之要其所謂不欲者無他直是主靜而已靜者天地之始萬物之終虛無而自然也靜以無爲而凡有皆從此生天下亦安有不定者哉論德章第三十八上德不德德大無上不曰有德是以有德和氣流行德合天地下德不失德有所窒礙是以無德與道相違孚佑帝君注曰上德卽無爲之德也無爲之德雖有以化化生生而究未有心於化之生之是不自以爲德矣惟不自以爲德而化生於其德者無弗歸之是不德而有德矣若從事於有爲而兢兢抱德以執之雖亦利及於物而德滯於有非德之所以爲德也則謂之無德也可上德無爲法道安靜而無以爲無所事於心下德爲之逐妄而有以爲迷眞又曰上德固無爲矣然或無爲而有所以尙不得謂之無爲也惟無爲而並無所以則混虛太空窅冥而不可窮至於下德巳不免於爲矣乃爲之而且有所以是其爲者乃其所以者也其所以者卽其所爲者也相提並論何啻霄壤欲不名以上下得乎上仁爲之施仁及物而無以爲本無作爲上義爲之以物爲心而有以爲流而忘返又曰德旣分上下矣豈仁與義獨無有上下乎曰仁義則下德矣此而更下不可言也第仁義旣同於爲而上仁何以爲而無爲上義卽何以爲而有爲耶曰仁主宅内義主發外宅内則慈祥愷惻運於一心可以爲之而不見此仁之所以能無爲也若發外則因物調劑稱物平施利在於爲固難冺張弛之迹也此爲之而所以有爲也乎上禮爲之以禮齊物而莫之應終不能齊則攘臂而仍之自昧其天又曰由仁義而推之禮禮更不逮仁義矣故仁義有爲禮尤有爲爲之所以冀物之應也迨爲之而不應則更設刑罰以約束之是强之也强其可以爲訓哉仍卽訓强故失道而後德不能神其神失德而後仁不能性其性失仁而後義不能心其心失義而後禮已失其眞夫禮者忠信之薄而亂之首也已非自然又曰由此觀之德者道之次也仁者德之次也義次於仁而禮更次於義故失道而後尙德失德而後居仁失仁而後由義失義而後制禮後其道德仁義無庸議也惟是禮則雖與仁義齊名而溯道之源攷德之始探樸之賦固無所爲禮也自失德失仁義而忠與信皆無復存於是乎制爲禮法以約束萬物而順之則治稍或强之則離德離心縱使粉飾具文而虛詐日生國不可以爲國矣故曰忠信之薄而亂之首前識者道之華而愚之始也求奇不實愚之倡始又曰大道本虛虛則空空則靈靈則神聖人玄覽萬物如鏡之澄澈物來畢照無所用識以識之也世人視止於目聽止於耳思止於心間或億逆微中燭於幾先則是謂之前識夫前識不亦分道之華乎而道尙樸不尙華也其自矜爲華者予智自雄者也恃其識而不識者正多擭陷阱愚我者正難逆睹故雖曰道之華而實愚之所自始也是以大丈夫處其厚不居其薄還湻返樸處其實不居其華韜光檢欲故去彼取此捨妄從眞又曰道厚於德德厚於仁仁厚於義而禮爲最薄此厚薄之大較也而道則樸實自明前識則雖華仍暗何去何從大丈夫其必有以處此矣故曰處其厚不居其薄處其實不居其華去彼取此所端有道矣法本章第三十九昔之得一者得一萬事畢天得一以清晃朗太玄地得一以甯河海靜默神得一以靈混然成眞谷得一以盈綽然有餘萬物得一以生自然發育侯王得一以爲天下貞泰然安國孚佑帝君注曰道不可名一則道之名也而亦卽道之體是一者天地之樞鬼神之宗萬物之祖帝王之本人第見天之清而不知其得清者有此一也第見地之甯而不知其得甯者有此一也至於神則稱靈谷則能盈推而及於萬物之生總皆禀這箇一而各擅其所有就是世之侯王亦必得此一而始可正帥乎天下也貞訓正其致之一也至誠天無以清將恐裂移星易宿地無以甯將恐發龍蛇起陸神無以靈將恐歇陰陽失候谷無以盈將恐竭閉塞不通萬物無以生將恐滅和氣耗散侯王無以爲貞而貴高將恐蹶國家危殆又曰是一也得之則天地神谷萬物侯王無弗位無弗育卽無弗治反是而無此一則推而致之害有不可勝言者天無此一而不將裂乎地無此一而不將發乎發卽發洩太盡也神無此一而不將歇乎谷與萬物無此一而不將竭與滅乎更使侯王無此一而享貴高之位天下不將由此蹶乎蹶卽詩方蹶之蹶顚覆也天地豈易裂發而爲此云云者甚言一之爲貴耳故貴以賤爲本神者性之基高以下爲基性者心之本又曰賤與下俱指道之一言道非賤也亦非下也而恍惚杳冥無形無聲不見可貴不見可崇則名之曰賤也可名之曰下也可而居貴與高者實不能舍之而他歧違之而或越也故貴則以賤爲本高則以下爲基是以侯王心也自稱孤寡不穀無所用其用此其以賤爲本耶惟道爲身非乎豈不然哉又曰夫以無能名之道而謬名以賤漫名以下不亦輕視此道乎而不知非也侯王之尊猶道之大也而其自稱則以孤寡不穀自謂然則非有味於此而以賤爲本耶抑非也耶故致數車無車混合不欲琭琭如玉不有其有落落如石冥然自全又曰故就其一而推致之無以生有也有而終無也猶之數車者若輪若蓋若軫與轊則厯厯若可數之而旣附之於車則第見爲車而己不見所爲他也故數車而仍無車卽車之一端思之可知道不著意想不落形迹不滯於貴也亦不淪於賤也正非如玉之琭琭止貴而不能賤也石之落落止賤而不能貴也道之一何無方而無體哉去用章第四十反者道之動神一出便收來弱者道之用致柔氣凝孚佑帝君注曰反卽物極必反之反亦卽反而歸者之反誠者物之終始無其始安見有終而無其終曷以反始况無名天地之始也有名萬物之母也反則無名而道無爲不終無爲也故見爲反而動已伏於其間此反所以爲動之用且道無爲則杳𣺌寂寞亦云弱矣而卷之則藏放之則彌化化生生並行不悖並育不害皆此無爲者以有爲也故曰此道之用天下萬物生於有有象非爲有有生於無無形本是無又曰卽此觀之可見天下之物皆從有生無此有安得有萬物而是有非本有也俱從無極生來向無此無則亦安有此有哉有其可名者也常道也無其不可名者也非常道也同異章第四十一上士聞道勤而行之聞非耳聞一聞便悟中士聞道若存若亡無處著力兩可生疑下士聞道大笑之因何信不及只爲太分明不笑不足以爲道百姓日用而不知也瑤華帝君注曰道不可道也而亦有其可道不可名也而亦有其可名雖可道之可名之而聞之者卒鮮卽或聞之彼且將道其所道名其所名矣夫惟上士一聞是道便知道雖虛無而實在吾身中勤勤焉服膺勿失奉之於胸卽佩之於身也降此而中士則若明若昧或信或疑可出可入道有時存卽有時亡也更降而下士則不知有道矣設有詔之以道者彼且大笑之以爲不足信也夫笑不幾於畔道也乎然惟聞之而笑斯足以爲道不笑不足以爲道也大道非庸流之所能識也故建言者有之因理見道又曰昔之達人曾有味於道味而𥪡論以建白者其言厯厯有之則吾亦樂取而列焉明道若昧不昧本來進道若退爲道日損夷道若類不生分別又曰其建言者何一則曰以此身而明道初不自知其明也雖明而若昧焉再則曰以此身而進道亦不自知其進也雖進而若退焉夷平也類卽等類之類建言者又曰道無險阻亦無奇特本平也而以吾之身平易行去若皆與眾共知共行而若類焉上德若谷包含萬物大白若辱素以爲絢廣德若不足惟恐不及建德若偷常懷此念一照一用質眞若渝應變無方又曰建言者又厯言曰以此道而形爲德德則上矣上則實矣而其心不自知其德也葢有如空谷然以其德而表爲白至潔也孰克污之而其心不自以爲白也葢有若污辱然層而累之德日以廣廣其不可自據乎而其心不自知其廣也猶若有不足焉德至於廣亦云建矣而其心不自知其建也尙有若偷惰然偷訓惰言德至於廣且達是非無所藉而能然也蓋由其天質之眞純一不雜方能造是境界是其眞質不大可恃乎而其心不自知其眞也殆有若愚魯然渝與愚通大方無隅不露圭角大器晚成道在萬物先成於萬物後大音希聲叩之卽應大象無形無所名相又曰德積於身則此身無弗尊且達矣建言者又厯言曰德備於躬直方大矣豈不可以駕馭羣倫而有德者不露圭角也雖大方而無隅焉隅稜角也且德備於躬棟樑之大器也豈其不可向榮而早發乎而韜光養晦必待晚以成焉徑寸之材不至於晚未克蔽日而干霄也以德而發爲聲秩秩德音萬物將取則矣而聽之寂然猶是大樂之無聲也蓋龍虎吟嘯從不輕發非若蛙蠅之聒聒也和順積中英華發外德未有無象者也而積而愈斂不落聲色究何所象乎蓋太素之質純白不受采也道隱無名無所指說夫惟道善貸且成能化其化而不自化又曰凡若此者皆所謂道而道不可名是蓋隱而無爲者而由無爲以趨於有爲則能推其有餘以貸不足而萬物賴之且相與以有成也道之大何如乎非上士曷克知之亦曷克體之道化章第四十二道生一虛無生一氣一生二一氣判陰陽二生三陰陽成三才三生萬物三才生萬物萬物負陰而抱陽背止其後視聽居前冲氣以爲和禀於中和瑤華帝君注曰一者純一不雜不二之謂所謂太極是也然當無始之初並無所謂一自有道而一始生焉有無極斯生太極也自太極判而爲兩儀一以生二矣由兩儀以列三才則二又生三矣自三才奠而天生之地生之人生之繁然不可紀數矣故物生於三則各禀其血氣而旣負其陰又抱其陽陰陽交會無所爲知識乖侮變詐也渾然寂然不過冲氣以爲和而已矣冲卽冲漠之冲冲漠之氣不淪於無不滯於有自然而然非和而何人之所惡惟孤寡不穀一無偶眾人之所忌而王公以爲稱自處謙柔又曰孤寡不穀微詞也賤且小者也言性旣冲氣以爲和則可小可賤而無庸高自貴大矣乃庸眾不識是性而偏惡夫賤且小者嗟乎何不思之甚乎彼孤寡不穀之稱非賤且小者耶而王公大人曷爲以之自稱耶故物或損之而益引之不得去弱用强或益之而損推之必還去剛爲柔人之所教無一亦無二我亦教之唯道而已强梁者不得其死好勝常逢敵亡吾將以爲教父不善善人之資又曰凡此者蓋以道尙夫損故也然損之又損以至於無可損則勢必轉而益迨益之又益以至於無可益勢又將轉而損損益之道盈虛之道卽有無之道也識得此道則與眾何好亦與眾何惡人教之吾亦從而教之矣和光同塵可也倘舍柔而務剛是强梁也强梁者乖侮是居尙得其死所也乎故惟是道虛而不盈無而不有損而不益柔而不剛吾將籍之以爲立教之祖焉父音甫祖也徧用章第四十三天下之至柔大道虛無有用馳騁天下之至堅軟能勝堅無有入無間貫金透石吾是以知無爲之有益以有契無瑤華帝君注曰堅卽剛也堅與柔有與無各相對待故柔者堅之反無者有之反夫人而知之也而用之則有道倘不知柔能克堅而遇剛仍以剛克其不折而敝者少矣惟舉至柔者以馳騁乎至堅則堅旣不損柔亦不靡何克如之且或不知無能生有而以有捍有其不至紛而亂者鮮矣惟根至無者以趨夫有則無不終無有不終有而無未嘗勞有未嘗覺有無相生斯稱無間則可知道總歸本於無無爲斯以有益也不言之教默識潛通無爲之益爲學日益爲道日損天下希及之民鮮久矣又曰總之道本立於無形而非有所作爲運於無聲而非有所昭示而不聲者若提其耳不形者若策其躬是所謂不言之教無爲之益也聖人行之而天下卒希有及之者矣中庸謂惟聖者能之其斯之謂乎立戒章第四十四名與身孰親名遂身退身與貨孰多利多害已得與亡孰病得寵思辱瑤華帝君注曰此名字卽榮名之名不作可名之名解言榮名雖可慕而或不自重其身以弋浮名是先失其身久必並其名而亦失之從可知身重而名輕也故曰名與身孰親擁貨以自封是亦肥身之計而身之所以爲身者貴德以潤之不在貨以豐之也一失其身身且不有安用是貨故曰身與貨孰多貨與名皆非切身之物也誠能不慕榮名不殖貨利而終日只知有道則道在我而得矣反是則亡夫道宜得也不宜亡也得之較亡其孰病乎有識者可憬然悟矣甚愛必大費溺於情欲必喪其本多藏必厚亡累於貪故必失其眞知足不辱大圓覺滿知止不殆應如是住可以長久無量無邊又曰世人爭名鶩利皆愛之一念階之也苟或注意於一物而從而爭之鶩之務求而得之勢必盡其所有而求之則不至於大費不已而多藏以爲富者悖而入必悖而出得之多則攻之眾欲不至於厚亡也能乎夫惟有得卽足足無盡也知足則有盡素位而行苟完苟美而不妄希不可必得之遇夫何辱焉登高防墜臨深防陷急流而勇退焉哲人所以見幾作也如是者謂之知止知止則不蹈於危殆矣而尙不可以長久也哉洪德章第四十五大成若缺自勝其用不敝韜光大盈若冲自默其用不窮登虛瑤華帝君注曰天下物之成者久則未有不敝而要其所以敝者以其有成之之迹爭用之勢流於敝若道之大成不若此也雖有成之之形而無成之之心常若缺焉亦如其無成不自滿假夫何敝而盈者天地鬼神之所惡也器盈則覆不利攸往惟道有盈之之理而無盈之之心雖大盈猶若冲虛而無物焉夫虛則靈矣靈則四會而五達其用亦安有窮乎大直若屈順道大巧若拙無爲大辯若訥忘言又曰類而推之曲則能全不尙直也任直過則多折故有道者不自處於直而委曲周旋之中禮常若屈而不克伸焉雖屈而直正大也至於巧則初不自以爲巧也自以爲巧其巧必勞故若拙焉不巧之巧巧斯大矣而闡揚道德則需辯有道者初不敢自逞其辯也自逞其辯其辯必窮故若訥焉不辯之辯其辯大矣躁勝寒清者濁之源靜勝𤍠靜者動之基清靜爲天下正人能常清靜天地悉皆歸又曰向使成而不缺盈而不冲以及直而不能屈巧而不安拙辯而不欲訥是猶躁之不能靜靜之不能躁矣彼躁能勝寒不能勝𤍠靜能勝𤍠而又不能勝寒偏於一邊非中道也一失中則紛紜擾攘全失清靜之體矣故必清靜以正天下斯爲得之儉欲章第四十六天下有道情歸性卻走馬以糞意馬閑靈苖秀天下無道性逐情戎馬生於郊意馬狂心地荒罪莫大於可欲一念易動禍莫大於不知足迷已逐物咎莫大於欲得豈可更添一物故知足之足常足鴻鈞賦予不爲貧瑤華帝君注曰尙書云稼穡艱難詩雅云稼穡惟寶則可知農事乃有天下者之亟務而窮兵黷武最足以妨農業是故有道之世寓兵於農屏却戰鬬田獵而馬無所用一時民得三時無害遂致力以糞田焉苟或無道則戎馬生於郊圻民不聊生尙何糞田之有要其戎馬之生總緣於僉壬敗類逢君之惡懸可欲者以相招而人君不以有天下自足且必欲得而甘心焉則其禍患有鮮所底者故以可欲者誘人其罪大矣而不知自足爲其所誘而必欲得之迨至得禍慘酷伊誰之咎乎太上曰禍曰咎蓋深切以警人也由是論之足有何盡貪得者緣於不知雖日求足而究不克足惟知現在處卽是足則無入弗得斯常足矣鑒遠章第四十七不出戸潛心知天下智周萬物不窺牖隳肢體黜聰明見天道離形去智其出彌遠神遊萬國其知彌少心包太虛瑤華帝君注曰易之同人曰出門同人昌黎伯曰坐井觀天斯二說者均與不出戸不窺牖之論相左而太上當日乃爲是說者爲性之渾全而言也蓋人同此心心同此道此一人之心卽千百人之心卽萬億人之心本是心以運之四海融於一室故無庸出戸而知之也天之道卽人之道喜怒哀樂陰慘陽舒恆相配待人身所以爲一小天地也川流敦化之德而卽本吾德以德之則天道瞭在爾室亦奚俟窺牖而始見乎世人不知道在目前而遠以求之惟其出求之彌遠則其知道也彌少是以聖人不行而知明鏡當胸不見而名寶劍在手不爲而成不動一毫又曰道之渾全如彼心之光瑩如此光瑩者渾全之用也聖人無方無體何慮何思其所知者不待行而始知其能名者不待見而始名則其所成者蓋亦無事於爲而爲之利已溥矣惟無爲斯以有爲有爲未有不自無爲運之也無爲之爲亦安用出戸而窺牖也哉忘知章第四十八爲學日益百尺竿頭更進一步爲道日損空諸所有納此一無損之又損皮毛剝盡惟有眞實以至於無爲恬淡虛靈無爲而無不爲自然萬化瑤華帝君注曰損益二字在孔子爲經世者說則取益而戒損在太上爲出世者說則取損而忌益如人或昧於道本而逐其末以學之博聞强識采實摭華黽勉旣深聰明就廣非不勤且專也然亦第謂之益而已苟一日知道而去其妄心收其放性處處俱從本原上探求舍多識而會一貫若是者方謂之損然知其當損從而損之是猶有心於損之也惟損之又損以至不自知其損則是無心損矣無心者卽所謂無爲也惟無爲而溥博淵泉無非道所充塞則亦無不爲也已故取天下常以無事無心是大還及其有事物來斯照不足以取天下棄天下如敝屣又曰道在損而無爲則亦何疑於治天下乎天下雖至廣大天下之人雖極繁多而將欲取天下之人從而化之使皆從而歸之則常貴於無事無事者潛移默運而耕田鑿井帝力何有之謂也若夫張皇補葺潤色太平而風卽於浮情流於僞天下相率而浮僞之則亦安克取天下而化之也哉任德章第四十九聖人無常心不以我爲我乃見心中心以百姓之心爲心人我之心同乎一性善者吾善之與我同然不善者吾亦善之各返其正德善矣同乎德化信者吾信之消息天然不信者吾亦信之誰非此道德信矣全其智信瑤華帝君注曰道無心也道生天天無心也天生聖人豈其獨有心乎故曰聖人無常心無常心者無成心也惟無成心而卽以百姓之心爲心矣曷以見其以百姓之心爲心蓋百姓有善卽有不善有信卽有不信妍媸美惡之分途也人類雖分聖人之心無分故於善者從而善之於不善者亦從而善之善不善在人而吾所以善之之心未嘗渝也德可謂善矣信不信在人而吾所以信之之心未嘗變也德可謂信矣德之善德之信則亦安用夫常心哉聖人之在天下惵惵毋不敬也爲天下渾其心忘所以然百姓皆注其耳目一有成心是有分別聖人皆孩之任其自然又曰聖人雖不以善惡信僞分別人品而天下之人偏以善不善信不信相挾相攻紛紛穰穰迄無甯日聖人用是憂之惵惵焉惵惵卽惴惴也爲天下渾其心於相忘在天下之人方注其耳目以聆聖人之獎讓以窺聖人之予奪而不知聖人之待天下全無所好亦全無所惡如嬰孩之純一無僞與天下相安於無事也故曰皆孩之貴生章第五十出生入死日圓月缺生之徒十有三初三生魄十五乃圓死之徒十有三十六虧至廿八喪魄人之生亦如月然動之死地水火相違亦十有三水成數六火成數七瑤華帝君注曰死生亦大矣而性固無生死也人出入之則有生死矣故能知性以見性見性以復性超出乎嗜慾攻取之外則從此長生假若昧失本性離卻眞性陷溺恒性日入乎紛華靡麗之場則自趨於死地矣出生入死其明較也人能去妄求誠守眞抱樸此鍊形住世者也生之徒也可生之道十有其三焉倘或緣情逐境耽滯於聲色貨利之中則是狥慾以喪生矣而謂非死之徒乎取死之道亦十有三焉生死之義明白昭雪若此而有人旣已知夫生之之道及物來誘之遂將素所知者頓忘而徑趨於慾海則其動而之死地者亦十有三焉夫生之徒十有三死之徒十有三生而動之死地亦十有三三三並而爲九而性止一性性之數恒少何不敵慾數之多乎夫何故人月相似以其生生之厚同天地之一氣又曰是非無因也以庸眾愛生貪生之厚故耳過於生生之厚自必趨於死之途矣蓋聞善攝生者無忿慾陸行不遇兕虎内省不疚入軍不避甲兵何憂何懼兕無所投其角身非我有虎無所措其爪我亦忘我兵無所容其刃此心自若夫何故本無生死以其無死地生死特一氣之聚散又曰庸眾厚生而不免於死也如是若所聞善攝生者則不然善攝生者本無生者也故在陸而行則不遇兕虎焉其入軍陣則不避甲兵焉非不遇兕虎也兕角無所投之虎爪無所措之則有若不遇也亦非不避甲兵也兵無所投其刃則有若不避也伊何故哉以聖人本無死地也聖人何以無死地以其無生也不有生亦安有死乎是所謂不生不滅不溺不焚不凋不殘之謂養德章第五十一道生之元皇祖炁德畜之化生諸天物形之在天成象勢成之在地成形是以萬物一切有象莫不尊道而貴德皆從道生妙法元君注曰道生天地何况萬物故凡自無而有者皆道生之也第道能生之不能畜之於是乎頼德德者道之所積而流者也並生並育非德充周於其中固難言咸若其性也道生卽常無以觀其妙德畜卽常有以觀其徼耳顧道雖生之德雖畜之而必有所附而斯形假如天地間無物亦安所知爲道之生見爲德之畜乎故形道之生形德之畜皆物也有物則有勢凡剛柔之相取燥濕之異宜動靜之互根隱顯之殊途相推相積而成者又勢爲之也物形勢成此特其末耳流耳由末以溯本從流以探源則總不離乎道與德也道之尊何如乎德之貴何如乎尊則師保承之貴則王侯奉之萬物共禀道德卽莫不共知尊貴也道之尊德之貴越古超今夫莫之爵而常自然生成道體受命於天又曰道德尊貴若是是豈有大於道德而從而爵之者乎曰非也此天爵也子輿氏所云之良貴也自然而生物亦自然而畜物則亦自然而尊且貴夫安得從而爵之故道生之德畜之禀其精含其氣長之育之遂其形字其材成之熟之權其成量其用養之覆之作其和護其傷生而不有内無其心爲而不恃外無其形長而不宰遠無其物是謂玄德合道又曰道之自然若此則本自然以及物而或從而生之或從而畜之或從而長之或從而育之以至於成且熟也養且覆也似皆出於有心而道固無爲也無爲則無心而成化矣雖生之而不自以爲有也不有則不恃爲一如其無爲於以長立萬物之上全不自謂有宰制之能如是者欲不謂之玄德能乎蓋德介有無之間雖形未形不可名無亦不可名有是德而玄者也德至矣歸元章第五十二天下有始道生一以爲天下母一生二妙法元君注曰始卽無名天下之始無極也自無極而太極無不終無而有矣有非卽有名萬物之母乎惟母能生萬物然不有箇始母從何有故曰天下有始方以爲天下之母也旣得其母二生三以知其子三生萬物旣知其子夫物芸芸復守其母各復歸其根没身不殆常存又曰子者母之所生也天下未有無母之子道生萬物則得萬物之母矣得其母則凡充滿於宇宙者皆道生之子也以母知子何事推求第子母有相顧之義倘子日逐於馳騁而全缺定省温凊之道雖博得箇爵祿以榮親而母之精神念慮巳隨其子消耗無幾勢不將淪於殆乎彼滯於有而不復反於無者何以異是故曰旣得其子則必仍完守其母方不至殆厥終身也塞其兌寡言惜氣閉其門收視返聽終身不勤不勞而治開其兌内境出濟其事外境入終身不救永絶道根又曰兌者悅也門卽理欲之門言母旣當守如是則當從事於淡泊清靜而無所用其滋擾矣天下紛紜類起於心之多悅而理欲之交不克貞耳惟塞其悅之之心閉其理欲之門相與於無相與則終身克全於道而不勞是爲不勤反是而不惟塞之轉以開之不惟閉之反以濟之將攻取日深䧟溺日甚旣失其母並害其子此其人之終身尙可以救援也乎見小曰明虛中則明守柔曰强剛中則强用其光照耀金庭復歸其明聖日聖月無遺身殃心無一塵是謂襲常直下承當又曰恒情每重大而輕小而不知小卽大之階涓涓不除遂成江海炎炎不滅遂至燎原是皆忽小之明徵也塞而閉之是以其所見之眞謹而守之尙不謂之明乎凡事退後視有如無而絶不與物爭得失其柔甚矣然惟柔斯能不敝不敝而尙不謂之强乎人生耳之能聽目之能視鼻之能嗅口之能味皆所謂光也以神運之不以欲滯之便謂之用其光聖人塞兌閉門非全絶意於物第以神運之用其光而已矣雖用其光又不欲使光之盡洩也仍聚其精以還本明之體如知子守母之謂故能復歸其明而不使少有滲漏以遺身殃如是則不溺不焚不凋不殘而得以常生常明相續而不絶矣襲訓續益證章第五十三使我介然有知未舉先覺行於大道一念而已惟施是畏一理而已妙法元君注曰夫道無爲則無所爲知卽無所爲行雖無知而知自存雖無行而行自在則亦不言而物化焉介猶忽也言使我忽然有知於道而以所知見之於行則設施建立非不卓卓可觀而民之望其治者已莫不心乎惕惕矣所謂善政民畏之是也大道甚夷周道坦易而民好徑思無邪又曰此民字作人字解夷平易也言大道本至平易平則不嫌於迂濶百年莫殫累世莫盡可也而人情鶩於近功欲速以求有濟則不惜闢徑以圖之矣夫好徑而期欲速其流弊尙有窮乎朝甚除心欲正田甚蕪性要明倉甚虛神要靈服文綵黃庭内人服錦衣帶利劍執劍百丈舞錦旙厭飲食何不食炁太和精財貨有餘但得歸復法金寶積如山是謂盜竽其盜機也非道也哉於道何有又曰有如賢良在位朝則以之欲速勢必聽譖謟而疏賢良善人其盡除矣深耕易耨田則以之欲速勢必揠苗助長而田反荒蕪不治矣陳陳相因倉則以之欲速勢必急功趨利耗竭盈儲而倉反空虛無有矣凡若此者皆好徑之害也由是以推則凡爲人上者總當黜華崇實端本舍末如衞文大布之衣大帛之冠可也若好服文綵喜帶利劍貪饕飲食擁財貨以自封則是盜之竽而已夫竽樂器之長所以聲樂者也竽作而眾音皆作人君以盜倡使民亦以盜和何以異此是所謂上有好者下必有甚焉者如是而尙不謂盜竽乎哉甚訓盡修觀章第五十四善建者不拔不出乎道善抱者不脫不離乎道子孫祭祀不輟此道常有妙法元君注曰剏建非常以期百世之基乃未幾而建者或從而拔之夫何故建未善也攀援鞏固以爲依附之資乃未幾而抱者或從而脫之抱未善也及身弗支而何况於孫子夫惟本道以立基址善建矣本德以爲依據善抱矣不惟不拔不脫而世世守之子孫於以相繼而不輟也豈不信乎修之於身其德乃眞築基鍊精修之於家其德乃餘鍊精還氣修之於鄉其德乃長鍊氣還神修之於邦其德乃豐鍊神還虛修之於天下其德乃普鍊虛合道又曰由是推之善建善抱總不外修其德而已矣德修於身則德乃眞矣德修於家則德乃餘矣德修於鄉則德乃長矣更進而修於邦修於天下其德有不豐且普乎大用之則大效小用之則小效也故以身觀身心中心以家觀家性中性以鄉觀鄉神中神以邦觀邦道中道以天下觀天下無中無吾何以知天下之然哉不無中無以此反求諸身又曰此字指身言以身觀身此身同此德同也以家觀家此家同此德同也以鄉觀鄉以邦觀邦此鄉同此邦同此德同也夫家鄉與國旣皆可以執此例彼豈天下獨不可以觀天下乎天下至廣也吾何以觀之哉曰卽以此身而知之也以天下觀天下猶以身觀身也豈身可以觀身而天下獨不可以觀天下乎玄符章第五十五含德之厚抱道比於赤子無心大還妙法元君注曰厚卽純一無僞之謂赤子知識未開渾然在抱秉厚無踰於此而體道者視於無形聽於無聲道自無爲我自無心其含此厚德默運潛行蓋有如赤子焉毒蟲不螫無畏猛獸不據無憂攫鳥不摶無慮又曰天下禍患之來非無自也總緣人有以召之如逐於有爲渉境多則戕賊以嘗試者亦多而或毒蟲螫之猛獸據之攫鳥摶之皆勢所必至者也若含德厚則我且無爲無爲而災害奚至則可不慮夫毒蟲猛獸攫鳥也矣據作噱音吸骨弱筋柔而握固神完未知牝牡之合而䘒作精全精之至也杳冥又曰且含厚而比於赤子更自有說赤子之骨弱也其筋亦最柔也而所握則常堅固而不易開當是時冥然無知寂然鮮動不知有牝焉知有牡卽又焉知牝牡之有合然雖不知而其䘒作矣是䘒也與形俱來有根於無者也是先天之所秉乃精之至者也含德厚者可援此例之䘒音裴赤子之陰也終日號而嗌不嗄性全和之至也恍惚又曰氣傷於和過號卽必嗄赤子不然雖終日號啼而其嗌固未見有啞是非赤子之能不啞也謂其雖號而不傷氣和之至也氣和則嗄安從生而又何疑於含德厚者耶知和曰常常寂光中知常曰明慧光明照益生曰祥靈源不竭又曰由是以觀則和爲貴矣和卽所謂柔也牝也卽所謂無聲無形之物也人特患其不知耳誠知之則道在是德亦在是而常爲道德之人不失常存之理時時奉而守之則始自明誠者久且誠則明矣故曰知和曰常知常曰明苟或旣不知和又不知常而益以生之夫大道無生安用益生益之則反賊之矣欲免於祥也得乎祥訓妖猶亂訓治也心使氣曰强氣動則剛物壯則老人欲太盛謂之不道喪亂本眞不道早巳眞不立妄不空又曰人知和則心靜心靜則氣常柔反是而使之則氣妄作而肆是謂之强梁也且强梁用壯剛過易折卽或不折亦必易敝幾見自古英雄常留天壤也耶故用壯而老皆非守柔守虛無名無爲之道是所謂不道也不道之事尙不當早已也哉已止也息也玄德章第五十六知者不言默識言者不知口頭三昧塞其兌内榮閉其門外衞挫其銳無爭解其紛總持和其光慧生同其塵離垢是謂玄同一貫妙法元君注曰道可言傳亦不可以言傳其可以言傳者迹也散殊也不可以言傳者體也一本也是惟知者識得道之來能無始無名而從無始而始無名而名總可以默守之故常不輕言夫道若捃摭一二擁座拂塵鑿鑿大言謬自以爲知道而不知者固已多矣此兌字指口言與上不同而門指喉舌言亦與上異言道在無言是必塞止其口而閉其出納之門挫其輕躁之銳氣解其結之紛紜而有光不耀用是和之雖塵弗避用是同之若是者可謂同矣而塞與閉挫與解和與同皆運於自然而無心以出之所謂玄也故曰玄同故不可得而親釋迦參禪未已亦不可得而疎太上學道未濃不可得而利伏羲究易未了亦不可得而害孔子夢奠方終不可得而貴道者心體亦不可得而賤心者道用故爲天下貴一切皆盡眞當獨存又曰事之操於人者人得主之而我不爲政孟子云趙孟之所貴趙孟能賤之是也若知道而默抱道而處則人不得親之夫親極必疎旣不得親則亦安從而疎之耶推之於利害貴賤均無弗然此道之所以不落聲色不著形象渾渾噩噩爲今古之重寶而見貴於天下也乎淳風章第五十七以正治國凝神以奇用兵明心以無事取天下了性妙法元君注曰事出於平易者爲正出於權術者爲奇而出於無心爲無事故撫國不事張皇不矜振作而與民共者同此庸常使盡人能知能行則是以正治之矣而凖此以用兵則勢有不能欲不以權術行之未克濟事故曰以奇用兵而欲胥天下從而化之使皆歸向於我正不貴乎要結招徠以有事也默化潛移而已故曰以無事取天下吾何以知其然哉以此得道天下多忌諱居移氣養移體而民彌貧此心易失民多利器念念伏躍國家滋昏此性不明人多伎巧性靜性逸奇物滋起心動神疲法令滋彰以心用心盜賊多有百念愈熾又曰以正以奇以無事斯三者吾何以知其然哉以此言卽以此道而知之也倘一出於有事則無論紛更多端卽所爲忌諱之事正復不少上多忌諱則爭言祥瑞惡聞災祲而閭閻疾苦壅於上聞民欲不貧也能乎利器卽權術也上好粉飾太平則質直鮮所投合而人爭以權術償之久之君日以驕臣日以諂上下相䝉而國家欲不至於昏亂也得乎由是而遞降焉人多技巧猶其有權術也夫技巧曲藝之事似於國有利無害而不知一尙技巧則凡可矜可怪之物羣爭搆之尤而效之而奇物滋起矣更由是而上焉文網日密爰書日甚法令滋擾使下民手足均無所措則賦黃鳥鴻雁者其不相率而爲盜賊也幾希矣故聖人云我無爲而民自化不尙權謀我好靜而民自正不用利器我無事而民自富不貴奇貨我無欲而民自樸身修國治又曰凡若此者皆有事以致之也若準無始之道以致治夫何有斯弊哉聖人知其然也而一凖無爲以立其本根無爲則靜而少事而蒞躬行已全然無欲則民或從而化之或從而正之而以務本業不趨浮僞其富也必矣質直好義承上意旨其樸也必矣夫有事積弊若彼無事獲效若此則亦何憚而不無爲讓聖人以獨至哉順化章第五十八其政悶悶昏默其民醕醕渾厚其政察察明見秋毫其民缺缺日以疎薄禍兮福之所倚損者益也福兮禍之所伏禍福無門惟心所召孰知其極無有邊際其無正耶道無形體正復爲奇心不可測善復爲妖不可知識人之迷昧其本性其日固久無始以來妙法元君注曰道尙渾厚不尙精明惟渾厚者無爲無爲而民自化一渉精明則有爲矣有爲則缺陷者必多故其政悶悶者其民必醕醕也其政察察者其民必缺缺也且從事於有爲者不過欲獲福而免禍耳而不知禍福雖是兩端實則一事當其有禍而福已倚於其中矣當其有福而禍已伏於其内矣禍福相乘罔所止極而昏昏者卒弗知之豈天下竟是一禍福之天下而無大道以正之耶要之正不終正正之復流而爲奇善不終善善之復返而爲妖人之迷弗悟者只知有福而不知禍已隨之只知有正與善而不知奇與妖已隨之嗚呼其蔽錮爲日固已久矣正復之正卽上以正治國之正善卽祥瑞之祥不作善字解是以聖人方而不割圓通廉而不劌清靜直而不肆中正光而不耀冲虛又曰凡物方者必割廉者必劌直者必肆光者必耀惟聖人於無極而有有極而無之理識得十分透亮知極者必有返時故方而不至於割廉而不至於劌直而不至於肆光而不至於耀歸本於無注德於柔守貞抱璞而超出乎禍福奇正妖祥之外省卻多少經營煩惱何等安閒而從容以中道也守道章第五十九治人事天存心養性莫若嗇以天理勝人欲夫惟嗇儉從約易從簡是謂早服先得此理早服謂之重積德有所操持重積德則無不尅復禮克已無不尅則莫知其極無所不用其極莫知其極可以有國靜極見眞種有國之母眞一來投可以長久神與道存妙法元君注曰嗇簡也柔也虛而無也世之治人者必從事於鋪張事天者必致力於昭格往往紛更滋擾而不知治人事天總莫若以嗇處之蓋人之心卽我之心以我之心治人是以心治心也我之心卽天之心以我之心事天是以心印心也而運於無形不見作爲之迹嗇之至矣下民化之卽根於其嗇而來是其輸服固已久矣非早服而何早服上之重積德以致之也德卽所謂嗇言重積德則德之所運風流而令行無弗尅而治之尅訓洽旣無弗洽則莫知其極矣莫知其極則德徧羣黎不事聲教而不動而變無爲而成尙不可以有國也耶第有國必得其母有國之母嗇也柔也虛也無也是卽不可名之道也以道治天下是以母育天下也而尙不享祚於長久也哉是謂深根固蒂深息固精長生久視之道虛空消殞道炁常存又曰凡物根不深者則易撥蒂不固者則易敗若本道以治之道之入人深者蓋固結而不可解矣是之謂深根固蒂而不惟治國且能長生夀已以夀人夀人以夀世於以悠久而博厚博厚而高明也倘所謂長生久視之道非耶居位章第六十治大國虛生明空生慧若烹小鮮治心亦易以道涖天下道不遠在身中其鬼不神陰魔俛首妙法元君注曰此二語於孔子武城之說相反適所以相成割雞焉用牛刀言小邑不必以大道治之此言治大國若烹小鮮言不知烹小鮮之法則不可以治大國也此何以說曰治大國不可煩烹小鮮不可撓撓則鮮者易爛煩則政治多擾夫是以取譬而喻世之所以重鬼神奇鬼神者以鬼陰之靈神陽之靈幽明胥待命焉若以道涖天下則聚精於至精之中秉靈於至靈之始無精也而有精無靈也而有靈此其洞洞屬屬神爲何如彼鬼亦第安於不識不知之天無所用其神矣非其鬼不神其神不傷人幻盡覺圓非其神不傷人聖人亦不傷人心境兩忘夫惟兩不相傷形神俱妙故德交歸焉道德感通又曰世人所以重鬼之神者以其能傷人也若以道治天下鬼神聽命則非惟鬼不傷人其神亦且相囿於大道而不致傷人矣是非神之不傷人也良以聖人治本於嗇守要於柔心而無心爲而無爲與天下渾渾悶悶全無作爲以害之是能不傷人矣聖不傷人而謂神忍傷人乎是之謂兩不相傷矣而神不傷人總由於聖不傷人以致之聖人之德何如也天下德之從而歸之且以德神歸神者亦併而德之歸之是交相歸也故曰交歸謙德章第六十一大國者下流上善若水天下之交眾高從下天下之牝眾剛從柔牝常以靜勝牡靜爲躁君以靜爲下無爭光垣帝君注曰自來任世者動曰必爭上流而不知上極必下迨上而下下不可爲矣太上則教人以下自居而有國者尤當下也故篇首卽曰大國者下流蓋國大則人歸之者眾猶水下則就之者多是大國本擅下流之勢而撫國者又能屏卻驕盈安處恬淡無侈大無張皇冲而守之抑而持之則是願處於下流矣所以然者天下酬應之交尙柔而不尙壯天下之牝皆性生於柔者也人而渉世接物以柔自處正不殊於牝也蓋牝之柔緣於靜牡則好動而不能靜此牝之勝牡端在於靜而靜非他也冲也抑也卽所謂下也人不知下豈其不知靜乎故曰以靜爲下故大國以下小國容納則取小國靜定小國以下大國處順則取大國存理又曰是下也保國之良策也大國小國均不可離者也大國而下小國則取小國之心而服之湯事葛文事昆夷是也小國而下大國則能取大國之心而悅之勾踐事吳太王事獯鬻是也故或下以取小必歸大或下而取大必納小又曰凡若此者或本此下以取人或守此下而見取於人可知柔能克剛柔之極正剛之極也大國不過欲兼畜人神者萬化之主小國不過欲入事人心者大道之源夫兩者卽心是道各得其所欲自當其分故大者宜爲下除垢止觀又曰且大國沃野廣饒帶甲千萬他何所欲不過欲四海歸心而同在吾胞與之内兼畜之已耳小國截長補短方五六十他何所欲不過欲撫我愛我吾甯入而臣妾之謹事之已耳大國欲之小國歸之小國欲之大國納之是兩者各得其所欲矣而得其所欲者非有他術也冲也抑也下也撫大國者亦何憚而不下也哉故曰大者宜爲下爲道章第六十二道者萬物之奥造化玄微善人之寶一點眞金源流天造不善之人所保人各有心謹持勿失美言可以市巽語能說尊行可以加人力行近仁人之不善昧道何棄之有道亦在光垣帝君注曰天地間散見於事物之中而可以範圍乎人者固自甚多然特其門堂已耳非奥也惟道介有無之間不絶聞見而究不落聲色則是幽深而玄遠方可云萬物之奥也善人性而有之如驪龍額下之珠本自生成非寶而何若不善人有而失之然苟能尋踪覓跡取已失者求而得之約而守之亦未嘗不可以束身於寡過是非其所恃以保者乎夫善者寶之不善者保之則是道公共之道也本道而發爲美言可以爲市於世奉道而尊行之亦可加之於人胥天下而化之在良材固成大器卽楛者亦不至棄於無用也道不遠人人之不善夫何棄之有哉故立天子心君置三公神氣精也雖有拱璧以先駟馬世之所貴不如坐進此道我之所寶又曰道之可寶如是則凡智愚貴賤均以道爲楷模是雖貴如天子尊如三公駟馬盈朝拱璧炫采而擁彼靡麗無裨於身心也何如日進於道日達於上乎故曰不如坐進此道古之所以貴此道者何也完我本無不曰求以得求則得之有罪以免耶純一如初故爲天下貴用和爲貴道斯爲美又曰是道也非始重於今而從古貴之者也彼古之所以貴此道維何不曰求則得之而凡有罪之物可以汚我者悉從而免之耶天下患在不可得與不可免耳而今則得之免之道之可寶何如乎故曰爲天下貴思始章第六十三爲無爲不擾其心事無事不鑿其性味無味不驚其神大小多少縱橫順逆報怨以德修行無咎光垣帝君注曰大道原麗於無無卽道之原也人惟趨於妄斯攻取多而作爲起道則不然苟能深味乎此則不必從事於爲無爲可也不必致營乎事無事可也亦不必備嘗乎味無味可也本此無以立體則任彼大小多少而總以無爲處之雖極之於所怨而物有致怨之事我無蓄怨之心不見可怨怨亦何報迨至渾忘我仍以德待之是所謂無怨也而無怨實根於道之無也圖難於其易抱一爲大於其細執中天下難事必作於易仁者先難而後獲天下大事必作於細積精累氣以成眞是以聖人終不爲大聖不自聖故能成其大身等虛空夫輕諾必寡信易悟易疑易得易失多易必多難大迷之下必有大悟是以聖人猶難之不可說破故終無難欲其自得又曰人倘不識無爲之道則必從事於爲而爲於其難者遂致輕夫易爲於其大者遂致忽夫細矣而不知易者難之引也細者大之階也故圖難則必於其易者先圖之爲大則必於其細者先爲之由易而難斯不難矣由細而大斯不大矣天下之難事大事皆未有不從易與細以致力也夫大事旣作於細則第求其細可矣聖人知之所以終不爲大也不爲大而大自在其不成者幾希矣推之易言與輕爲似若兩途實同一轍彼輕諾者易言之故也而巳信之寡矣輕爲者視事一切皆易而正惟多易其跋前躓後者難正不少是以聖人雖由細以幾於大而此心惵惵戞乎其難蓋臨事而懼之衷也究之愼終如始固無入弗得矣夫何難之有哉守微章第六十四其安易持安靜自得其未兆易謀臨事謀始其脆易破防危慮險其微易散道心惟微爲之於未有未發之中治之於未亂發皆中節光垣帝君注曰安者無事之時暇豫之居諸也而安每卽於危者以人恃其安而放之故安不終安要之其安原我所應獲是在於守而持之耳持之固自易也事幾己露每難圖維當其未兆尙在寂感之交於此致力謀孔易矣譬之於物質久而堅急難攻錯若當其脆破可立致何易如之而積重者難返勢大者難圖當其微未至於重且大也從而散之夫亦易易所謂先事之圖必在幾先之哲也故爲之於未有者尙無所有也清其源也上也治之於未亂者已有而未亂也塞其流也次也合抱之木生於毫末從微至著九層之臺起於累土登高自卑千里之行始於足下行遠自邇爲者敗之道不可窮執者失之道不可得是以聖人無爲故無敗與道合一千古不朽無執故無失與神合無萬世常存又曰聖人之所以致防於未然者以小宜謹而微宜愼也蓋小者大之基微者顯之機維彼合抱之木不始於毫末之萌櫱乎九層之臺不始於累土之逐加乎千里之行不始於足下之歩趨乎夫小必大微必顯近必遠也厯厯如是則是未兆之先無所庸其滋擾矣而逞妄以爲之者必至於敗膠執以自信者必至於失聖人則不若此也知道在於無而卽以無爲安之以無執化之夫何敗與失之有故曰無爲故無敗無執故無失民之從事不知自然常於幾成而敗之不謹於始鮮克有終愼終於始則無敗事初心不昧永無危殆又曰彼聖人之無爲無執不可望之於凡民也彼民囿於習染蔽於聰明狃於僞妄其從事也每於事幾之已成而始加圖謀究之勢已逼近雖極力挽囘不克旋轉每十無以救其一此敗之所以類然而要之人情多致謹於始而於終則疎忽之若果能愼終於始先後一致亦胡至以敗事聞哉是以聖人欲不欲欲人之所不欲不貴難得之貨尊德樂道學不學學人之所不學復眾人之所過反本以輔萬物之自然與時偕行而不敢爲愼獨戒懼又曰古之聖人知其然也故眾人有欲聖人不諱言欲而不欲之欲乃其欲也夫以不欲爲欲亦安貴難得之貨也乎眾人有學聖人不諱言學而不學之學乃其學也夫以不學爲學尙不可以轉眾人之過而免之也乎復轉也夫其所以不欲不學者道尙自然正無事乎欲與學也萬物皆禀是自然之道而卽以無欲無學者輔之而弗敢爲焉此聖人之以無爲立隆於天下萬世也夫淳德章第六十五古之善爲道者非以明民在明明德將以愚之不使其有知光垣帝君注曰三皇而後堯舜禹湯文武均號先覺先知惟先覺則以所覺者覺人惟先知則以所知者知人總欲使民歸於明而已矣究之於道無渉也道在於無爲也故古之善爲道者不欲使民趨於明將以愚之使民常安於無知無覺之中庶幾僞妄不作而渾渾噩噩我得端居而默拱矣民之難治心亂以其智多動則易昏故以智治國國之賊覺亦有念又曰上古之世無懷葛天民風何等湻厚何等渾樸御世者不煩而自就理三代而下世風澆薄人情洶僞蓋苦於難治久矣而要其難治之由實緣於多智智則譸張爲幻奸宄叢生而文網雖密不足以羅之矣夫民旣以智而難治則智其當絶也明矣尙可以智爲之倡乎苟以智治之則不惟不愛國且害國矣非國之賊而何不以智治國國之福道之以德其民有餘知此兩者亦楷式道貴若愚行爲世法能知楷式抱虛守中是謂玄德教父玄德深矣遠矣愈覓愈深愈求愈遠與物反矣不與萬法爲侶乃至於大順逆行順化又曰誠不以智治國則渾淪無爲國之福也彼以智則賊國不以智則福國知斯二者尙不可以爲楷式也乎要之楷式非他無爲之德也玄也夫德謂之玄則至深矣至遠矣與物相反矣何言之世人尙智聖人尙玄反而用之者也尙智則徇欲忘理而多逆尙玄則默運潛移而自化順之至也故曰乃至於大順後已章第六十六江海所以能爲百谷王者心爲萬法之王以其善下之虛而能容寂而不見故能爲百谷王異派同歸是以聖人欲上民使人知道必以言下之示之以無欲先民使契乎道必以身後之能忘其心光垣帝君注曰江海巨津也而百谷朝之以其王也要其所以爲百谷之王者以其勢處於下眾流歸之書曰江漢朝宗於海非善下而能王若是乎聖人有悟於江海知人之不可據上也而必以言下於人其下愈卑而下者上之已高不可仰知人之不可漫先也而以其身後之其後彌遠而後者先之已軼不可追究之聖人非有意於下之後之也道本如是則其居上與先者固卽存於下之後之中也道也是以聖人處上而民不重道大處前而民不害性空是以天下樂推而不厭中心悅而誠服以其不爭不與物競故天下莫能與之爭自然無礙又曰第上矣先矣而居上者勢患重民居先者勢患害民聖人雖上而不自尊貴何重於民故民亦不苦其重雖居先而不自謂無前故不害民而民亦不受其害於是乎翕然歸之羣焉戴之共推以爲有道而絶無厭棄之心悅而誠服莫敢不享王矣而要其不上而下不先而後皆此不爭之心與天下相忘故也語云仁者無敵聖人旣不自處於爭則凡爭者不惟不忍與之爭且不能與之爭矣此道之所以貴下與後而聖人則之者也三寶章第六十七天下皆謂我大惟道獨尊似不肖如愚夫惟大故似不肖無可議擬若肖久矣其細也夫可比便小光垣帝君注曰天下之至大者莫道若矣聖人奉道以爲依歸則天下之至大者亦莫聖人若矣世人大道則亦因大聖人故皆謂之大然雖謂之大而竊疑其渾漠相處絶不見有震動恪恭若一無所肖者然故雖大之而又以爲似不肖也夫旣大之而又不肖之亦何畸輕畸重之若此耶然無足怪也不肖始大大實似無可肖也故曰惟大似不肖若肖矣而於禮樂刑政之間斤斤以求合沾沾以急功則是驩虞雜霸之爲蓋𣺌乎其細久矣我有三寶持而寶之道不可離一曰慈專氣如嬰二曰儉少私寡慾三曰不敢爲天下先退藏自牧夫慈故能勇其力大儉故能廣其量深不敢爲天下先心廣故能成器長體胖又曰夫聖人之所以大而不落聲色者以其有三寶故也持此寶而重之則揮絃就理何事作爲是卽王天下三重之謂三者何一曰慈慈忍也謂慈忍而斂也其二曰儉儉約也儉約而不敢肆也三則曰不敢爲天下先卽以身後人之說也人特患失此三寶而不能慈且儉以先人耳果能慈忍而有濟則以有守發爲有爲勇何如也果能儉約以自斂則能發必自能收廣何如也果能不敢爲天下先則後人者必居其前不以力强而强固已多矣是渾樸之器也卽大成之器也成是器而與天長存可矣今捨慈且勇逐物捨儉且廣貪嗔捨後且先急欲求成死矣不見乎道夫慈以戰則勝仁者無敵以守則固靜以待之天將救之惟德是輔以慈衞之守位曰仁又曰聖人三寶若是今或從而反之捨慈以就勇也捨儉以就廣也捨後以就先也是三者皆有取死之理其不入於死者幾希今且就慈一端言之小不忍者亂大謀臨事懼者无祇悔慈忍則不敢輕敵而量敵故以戰則必致勝且慈忍則必内謀之密外謀之周而敵乘無隙守何固也蓋是慈也天所與也天將救人於塗炭之中恒開廣聖心之慈以爲斯民之衞乃聖旣衞民而被其慈者亦從而衞之慈之可寶何如也而信與不先可例推矣配天章第六十八善爲士者不武慈和善戰者不怒寬泰善勝敵者不爭安穩善用人者爲下小心翼翼光垣帝君注曰士戰士也行列之中以怯爲勝惟能怯斯以勝敵而不恃夫赳赳桓桓之武也善戰者以義制兵可進則進不注於進可殺則殺不注於殺而無所用其怒而善勝敵者恒以兵爲不得已之爲雖戰而有矜心初無所尙其爭也至於用人之善亦初無他術也冲而抑之約而斂之善下而已是謂不爭之德好是懿德是謂用人之德天理自見是謂配天高明古之極大道乃明又曰言此不武不怒不爭而善下也皆德也德而不自有其力者也德烏在是卽不爭之謂也而不自有其力則且以用人之力矣渾渾而蕩蕩噩噩而巍巍是尙不可以配天而與古爲徒至極而無以復加也哉玄用章第六十九用兵有言託已設義吾不敢爲主而爲客任他爲主我爲賓不敢進寸而退尺分寸之間進退火候是謂行無行莫慘於志鏌鎁爲下攘無臂不得已而後起仍無敵一陣交鋒定太平執無兵兩枝慧劍埋眞土光垣帝君注曰道德尊經八十有一篇其言兵者數篇非好談兵也所以甚惡用兵而垂戒也此篇通體雖是說兵實以喻道讀者勿以文害辭辭害義也用兵有言猶云古之用兵者曾有是說主則制敵之謂客則應敵之謂制敵則尙武尙爭應敵則不過敷衍應酬期無敗覆而已故善戰者不敢爲主而爲客也進寸則其進無幾而巳居然進矣若退尺則退之惟恐不遠者也不主而客不進而退皆所謂守柔守虛而無或强與實矣凡軍行者必有行列而攘臂以爭之因敵以仍之持兵以執之若爲客與爲退則不陣而行之如無行也不爭而攘之如無臂也不戰而仍之如無敵也不勇而執之如無兵也退而爲客其知道乎仍就也詩云仍執醜虜是也禍莫大於輕敵守城野戰要防危輕敵則幾喪吾寶恐喪吾家無價寶故抗兵相加縱橫順逆没遮攔哀者勝矣飲酒戴花鬼神哭又曰由此觀之兵者禍也用兵而輕敵尤禍之禍也故禍莫大於輕敵一輕敵幾喪失吾寶矣寶卽上篇三寶之寶如是而奈何獨恃力以尙强乎故當抗兵相加之時能時切哀矜之心者方爲愛人之至而不欲勝人常制勝矣誠卽用兵之道以悟立身之道道不遠矣知難章第七十吾言甚易知惟心而已甚易行惟道而已天下莫能知不知無心莫能行不知大道光垣帝君注曰天下平近淺淡之處卽精深微妙之所存道本平近淺淡者也以此道而發爲言吾言甚易知以此道而見諸事吾事甚易行耳易知則宜盡人能知矣易行則宜盡人能行矣而天下卒莫能知與行者何哉以平近淺淡之不足知不足行故也而求之於精深微妙則反失其知與行嗚呼其亦不思甚矣言有宗物有本未事有君事有終始夫惟無知冥然是以不我知夫復何有又曰由是論之與其言之無稽何如簡默之爲貴也言本有宗離乎宗者非言也與其行之不軌何如樸率之爲貴也事必有君背乎君者非事也我知宗而言之易我知君而行之易世人不知宗與君因以不知我是皆人之無知也人旣無知則亦安能知我乎宗君卽主宰之謂知我者希孰是知音則我貴矣孰肯承當是以聖人被褐懷玉衣錦尙絅韞櫝而藏又曰夫人不我知患在我乎亦患在人乎是惟知我者希則我愈尊貴矣神聖之詣豈尋常之耳目所能窺其萬一者哉所以古之聖人闇而章簡而文温而理美在其中外觀不耀其被褐也若不異於尋常者流而所懷之玉則固已抱寶弗拭彌斂而彌越也知病章第七十一知不知上眞知不知知病妄知普鍊帝君注曰大道廣大精微卽知之猶恐膚末何况無知是則知者求道從入之途也第知則知矣而不可存一知之心著一知之見故凡能知而不自以爲知者最上乘也若徒得其膚未而於道全未深知則亦不知之類而詡詡自謂有知則是病而已矣夫惟病病惟恐有知是以不病終無妄知又曰由是觀之不知而以爲知是生人切已之病也誠以此病爲病則必能日求其所未知者以底於知之盡而然若歉一如無知方與道相符契則亦何病之有聖人不病塵淨光生以其病病一念不存此性乃見是以不病三界惟心一切惟識又曰企此者其惟聖人乎蓋聖人無予智之病者也而不病由於病病則是道無爲聖人之知亦無知無無有無有有無有此其所以德契鬼神而靈關朗照也其不病職是故耳愛已章第七十二民不畏威不能究心大威至矣生死事大普鍊帝君注曰人之有性本自挺然高出物表雖無威可畏無儀可像而位天地育萬物正有大威者存第人昧於吾性之貴而以死生得喪之故橫於胸中則凡有操生死之權握得喪之柄者鮮不俯首而畏其威而所性之威反不克立苟能一死生齊得喪不見有威可畏將鍊形以鍊神鍊神以鍊性而超出乎死生得喪之外則大威固不求而至矣無狹其所居身藏世界無厭其所生無勞爾形無搖爾精夫惟不厭洗心滌垢是以不厭神自居之又曰大威如是則可知性地廣濶人當卽其廣濶而安宅焉而無容狹隘其規模也不知者逐於紛華靡麗從而狹其所居不亦可憫之甚乎夫不知而狹固失性矣其有知之者以紛華靡麗之害性而以爲此害性之物總緣此生以招之而欲絶其物因並厭其所生夫生亦不可少也倘皆厭生宇宙間無人類矣聖人知之而旣不狹其所居亦不厭其所生夫惟不厭是以雖住生於世而所性冲然萬物樂附初無有厭斁於天下也故曰夫惟不厭是以不厭是以聖人自知不自見虛能生白自愛不自貴人人本有箇箇不無故去彼取此去彼見貴取此知愛又曰恒流每苦不自知卽或自知亦不能不亟於表著每苦於不自愛卽或自愛則未有不侈然自尊者是皆昧於大威者也大威有不見之見有不貴之貴者存聖人知其然也是以自知而不自見自愛而不自貴故去彼取此彼指狹居厭生言此指不見不貴言去取之間嚴於彼此如是任爲章第七十三勇於敢則殺剪除妄念勇於不敢則活守雌抱一此兩者能殺能活或利或害禍福昭然天之所惡貴無所用孰知其故天道無知是以聖人猶難之堯舜其猶病諸普鍊帝君注曰勇者美德也而人恒以敢敗之遂致美者不美故負此勇而濟以敢心則捐生輕鬬勢將不免於殺反是而勇以不敢之心處之則守柔守怯動出萬全希不存活者矣此兩者或利焉或害焉乃常理也然天下間有因敢而活不敢而轉死者類出乎常理之外人不克解則搔首以問天而天之好固不可知卽天所惡亦無從而知其故也是以聖人有見於天道隱微而猶難乎其測度焉天之道不爭而善勝自然神化不言而善應動應以時不召而自來負陰向陽繟然而善謀無爲而成又曰要之天道大公至正不怒而威隱而顯神而靈不遺不禦者也所以凡物尙爭不爭則不克勝而天則無所爭也乃萬物無弗聽命其善勝也固已多矣天不惟不爭也而亦不言雖不言而應之者無有或爽時行物生曾有愆乎曾有窒乎且不惟不言也亦無所用其召抑之詩曰神之格思不可度思蓋不召而巳臨在上質在旁矣而且與地並其大生廣生之功生日月生星辰生山水其爲人謀也無弗周緻蓋又繟然而善焉繟卽聯絡不絶之謂天網恢恢何物不在此道之中疎而不失此道常在萬物之内又曰夫旣不爭不言不召繟而謀也天之於物亦何周密而無間乎乃或有因一二死生得喪之事稍出常理之外者遂以爲天之網恒多疎也而不知徼倖者不可常彰報者恒在遠書曰惟天聰明詩曰日鑒在茲天之網蓋恢恢廣大而無或有逃其鑒察者福善禍淫雖疎而究未有失也制惑章第七十四民不畏死念死道全奈何以死懼之海枯終見底人死不知心普鍊帝君注曰民情所惡者死也曷言乎不畏曰謀生之計過也聲色貨利凡可以厚生者有其得之雖至死亦不恤夫何畏死之有而在上者不知其不畏死也且多方設死以懼之而不知其所設者皆民之所甘蹈者也如之何其以死懼之也耶若使民常畏死惟貪生不知死而爲奇者素隱行怪吾得執而殺之安能殺心孰敢誰肯又曰若使民知養生衞生之道則必常能畏死不自戕賊其生而其中或有越乎道德而爲奇淫者則吾得執而殺之殺之正所以畏之也殺一人於以畏億萬人也孰有敢蕩越心志而甘害其生者乎常有司殺者殺心爲司殺能絶有念又曰司殺者天也言民有取殺之事而司殺者從而殺之是天本欲殺之也我卽奉天命以殺之非我殺之仍天殺之也夫代司殺者殺他心雖同我不可代是謂代大匠斵纔生思惟勞而無功夫代大匠斵者事物之來情慮之及希有不傷其手矣輕弄命寶後必有災又曰若天未欲殺而我從而殺之是代司殺者殺之矣殺不在天而代殺者殺也是猶代大匠以斵之矣夫大匠善斵者也善斵者自無或傷代而斵之鮮有不傷其手者代斵而且傷其手豈代殺而不自殺其身乎感應篇云殃必及身此之謂耳貪損章第七十五民之饑人不知道以其上食稅之多以其心之念不已是以饑所以不知道民之難治人之不得道以其上之有爲以其心之事不停是以難治所以不得道普鍊帝君注曰國之大計在農民之大本在食而往往不免於啼饑者以上之賦稅過多而妨其食也稅其食卽奪其食也夫安得而不飢斯民共秉是性則亦共秉此道從令如流固其所也而往往梗頑之不克治者良以上昧於無爲之化而多方作爲以震動之則民亦相率而趨於紛紜不克靜矣不靜而尙可以治乎故曰難治民之輕死人之不合道以其求生之厚以其心之情不盡是以輕死所以不合道又曰卽此推之順治者則未有不重其死者也乃有不以爲重而輕之者何哉蓋以求生之厚苟有可以利生雖䧟危亡而弗恤故視死如歸或從而輕之矣則甚矣生之途卽死之途也身旣䧟於死矣雖厚亦何以爲生哉夫惟無以生爲者勇於忘我是賢於貴生所以得道又曰夫惟無以生爲者不存一生之念不設一厚生之想而可以生可以無生全不知有其生則是忘生以生而生之所全多矣豈不賢於彼後生以貴生者哉戒强章第七十六人之生也柔弱水結成冰其死也堅强冰消卽水萬物草木之生也柔脆水流元在海其死也枯槁月落不離天故堅强者死之徒死者生之本柔弱者生之徒生者死之基普鍊帝君注曰大道尙柔柔者虛無之作用也而柔之中有至堅者存故柔爲上人之生也能味乎此而立身一出於柔弱則精氣神結而不散其死也必能堅强而不至與草木同腐蓋萬物草木之生也亦未嘗不柔脆而死卽至於枯槁者無所以爲柔者也君子鑒於齒敝舌存則知堅强以自負者有取死之道死之徒也柔弱以自處者有生之理生之徒也是以兵强則不勝心雜則道愈遠木强則共念頭不已心則愈雜强大處下沉淪之本柔弱處上升騰之象又曰夫堅則必折强則必死故凡用兵不知守柔而恃强以爭則必不能取勝譬之於木柔穉者工師弗貴若自拱抱以逮干霄不謂不强而斧斤之八羣然代之則是其强徒以供人之斬伐已耳由是觀之强大者必折柔弱者多全然則必折者不居其下乎多全者不居其上乎至理彰彰如是而人乃貴堅强而恥柔弱抑獨何耶天道章第七十七天之道其猶張弓乎心性有力普鍊帝君注曰道不可名其可名者天也道不可見其可見者天也而可名究不可名可見卽不可見則不得不罕譬而喻之其道殆有如張弓者然高者抑之省思慮下者舉之奮精神有餘者損之絶嗜欲不足者補之養冲和天之道損有餘而補不足虧盈益謙人之道則不然反是損不足以奉有餘貪其所愛忘其自然孰能以有餘奉天下損已益人惟有道者傚天又曰曷以言乎猶張弓也蓋弛弓者尙角張弓者尙筋總以端平正直爲凖故於高者則從而抑卑者則從而舉於其有餘處則不得不損以汰於其不足處則不得不與以益凡此抑之舉之損及與之是皆張弓之道而卽以取譬於天之道何弗然也蓋天道至公天心最慈其於人也類損有餘以補不足若人則私而多忍者也損益之數恒與天反每多損不足以奉有餘焉而要之人道之所以異於天者以其有已之見存也有爲已有餘爲已餘遂不甘持以與人此其所以去道恒遠夫孰是能舉已之有餘以奉天下者乎是必爲有道者能之而去道遠者固不克稍及其萬一也是以聖人爲而不恃存心無心功成而不處率性忘性其欲不見賢邪損之又損又曰旣舉有餘以奉天下則亦道可恃而名可處矣乃有道之聖人多爲之而不自恃雖功成而不敢處夫何故以道固無爲無名者也無爲無名則是無賢也道旣無賢賢烏乎見然則聖人之不欲見賢豈非體無爲無名之意也耶任信章第七十八天下柔弱人之生也莫過於水人之心也而攻堅强者莫之能勝棒打不開其無以易之情念死矣故柔勝剛心有力則情念自消弱勝强心無爲則天道乃見天下莫不知人人具此衷莫能行人人昧此理是以聖人言聖人知之受國之垢是謂社稷主藏心不見一身之主受國之不祥是謂天下王藏身不靈萬法之先正言若反正言合道而反俗普鍊帝君注曰傳云水懦弱民狎而玩之是天下之最柔弱者莫過於水而貫金觸石穿巖潰山上邱阜下江河其攻堅强也往無弗克莫有能與爭勝而從而易之者則是弱能勝强柔能勝剛其明較也天下人亦莫不知之而究莫能行之宜乎蹈死於堅强者比比也而要之人之所以不爲柔弱者以柔爲受垢之階而弱爲不祥之德也是何未奉教於聖人乎故聖人云受國之垢則是謂社稷主矣受國之不祥則是謂天下王矣乃聖人正言之而世人每以柔爲垢以弱爲不祥與聖言恒有相反抑獨何哉任契章第七十九和大怨嗜欲殺身必有餘怨情念不斷安可以爲善何以見道普鍊帝君注曰聖人與人同自道生厥有恒性性卽道所賦也識得此性大同均可渾然相與而旣無所爲德亦安有所爲怨此聖人之所以出而與天下渾也而不知者謂人情之多怨皆因不能和之之故於是從而調和其大怨焉第和則和矣而怨之之心終未嘗忘也强以和之一時暫釋踰時又將復然其不至有餘怨也少矣是安得謂之善和其怨者乎是以聖人執左契正念現前而不責於人勿與勿競故有德司契以心契心執其信約無德司徹自非寂照何能渾然又曰契卽文劵合同之類彼此各藏其半有事則取以相合而爲憑者也言世人之所以解怨不解者緣於昧性以求妄而馳逐於名利之場無有人從而默化之也惟聖人淡泊以明性不邇聲色不殖貨利與人相安於無爲相渾於無心使天下盡去妄以求復性迨性復而妄捐莫不曠然自得油然相與而怨無從生是猶之聖人執其左契而人皆以右契來合兩兩相印初未嘗有責於人也而感者不介而孚矣此所謂有德則司契而無德者家爲之喻戸爲之曉盡人而召之盡人而止之雖通徹以治理不終勞苦而罔功乎是之謂無德則司徹也徹訓通天道無親靈光獨耀逈脫根塵常與善人無得無失又曰聖人司契如此則其有契於天心也眀矣惟天虧盈惟天福善大公至正固無所爲疎而亦無所爲親也善則是與而已矣天不與聖人而將誰與也哉獨立章第八十小國寡民大智光中普鍊帝君注曰此章是太上治世心法本領俱寓於此太上生當文勝之時急欲返之於質故竊願得小國而寡民者一治之是亦方六七十如五六十之謂亦卽如有用我其爲東周之意使有什伯可養人之器而不用其國太平使民重死一念不生而不遠徙念念在茲雖有舟車三車來往無所乘之實無來去雖有甲兵負甲持符無所陳之六根清淨使民復結繩而用之信是道之源又曰有國有民將何道以治之曰將以愚之而已後世覺民於智民智一生萬妄將作而負才者恃才厚生者輕生不馳逐於商賈卽肆志於甲兵而古處之風杳矣惟常使之相安於無爲卽有什伯人之才器而不表見以求用於當時亦使之囿於方隅重於性命而不肯輕去其鄉雖舟與車莫不供給而無所遷徙則亦莫有乘之者矣雖甲與兵罔弗具備而舍强就弱則亦安有陳之者乎充斯治之則是書契徒爲滋擾正不若太古之初結繩而治之者古道爲堪復也甘其食味道之腴美其服受道之庇安其居處道之安樂其俗樂道之和又曰民風渾噩若是亦安有所爲衣食之甘美也乎又安有所爲居俗之安樂也乎而不知食難盡甘見以爲甘則甘之矣其食固自甘也服難盡美見以爲美則美之矣其服固自美也居難盡安而俗難盡樂見以爲安與樂則安且樂之矣其居其俗固自安也樂也四其字要理會蓋卽渾噩之民所自有也與不攺其樂其字同義鄰國相望心心相照雞犬之聲相聞照見五藴皆空民至老死灰心絶念不相往來如如自在又曰對國而言則有鄰言民苟甘食美服安居樂俗如是則共處於不識不知之天而無所用其周旋矣故雖相望有鄰國相聞有雞狗而爰居爰處得安生業彼此無求無與雖至老死可以不相往來則湻風沕穆省卻多少紛更滋擾治國之道無踰於此顯質章第八十一信言不美淡而不厭美言不信甘而悅人善者不辯訥言敏行辯者不善巧言易以招尤知者不博守元得一明理達根博者不知通於物務事多則惑普鍊帝君注曰信誠實也誠實之言有根本而無枝葉固不足以悅人之耳未見美也而不美實有至美者存若多事美言或秩秩或娓娓是誠美矣而言不由中徒滋圭玷亦安取是不信爲哉推之於善果有美之在中焉用辯論以自炫而喋喋好爲辯給者是佞而已矣未見爲善也况大道只要能知知則貫貫則該其焉用博苟沾沾於多學而識自謂能博究之窮大失居其所知固甚黯也不可謂之知也聖人不積聖道運而無所積旣以爲人已愈有如鑑之照而不疲旣以與人已愈多如井之汲而不竭又曰夫所貴乎不美不辯與不博者以道一而已也聖人知其然常抱此一以自守而不多積以求炫於世要其一可卷而藏卽放而彌者也本此一以爲人是卽以已所有者爲之也而取之不窮已愈有焉本此一以與人是卽以已之多者與之也而用之不匱已愈多焉天之道利而不害天地之大德曰生聖人之道爲而不爭聖人之守位曰仁又曰於此而更悟天之道矣天能利人亦能害人而能害不害惟物是利焉此天之所以爲天也道也於是而更悟聖人之道矣天下能爲者未有不爭而能爭不爭爲運於無爲是聖之所以爲聖也亦道也道在不爭道在不害而歸本於不積不積則亦不博不辯不美焉道本沕穆仍還他一箇沕穆知聖者其天乎則天者其聖乎嘻太上之言道也至矣蓋蔑以加矣太上道德經解後跋余少學時與釋者佛印遊頗得禪機三昧嗣後凡見梵典罔不了然心胸間而於道德之學則未之有得也迨後以黨籍見謫嶺表時與木石鹿豕居遊一日登迴鶴峯見有黃冠拍板唱歌而來向余長揖曰公學富矣亦曾見道德尊經乎余曰嘗讀之能解道德尊經乎余曰略解之黃冠因哂不置謂余曰解則解矣略解何言也倐忽不見因悟黃冠乃異人而未叩其姓名閱兩載恩詔囘京師黃冠之言未嘗一日忘每欲將道德經研窮作注而政務紛擾迄無成就嗣得余弟子由敬注尊經一帙繙閱之餘不覺起敬起羨以爲此注一出當無復有出其右者而今乃見八洞仙祖合注異體同心同心同筆同筆同妙分明八洞之文如出一人之手倘所謂合同而化者耶自有此注而諸注可無庸矣自有此注而尊經益昭垂不朽矣余沗列仙末旣獲見宏文而捧誦之因詳述所由而敬跋之蓬萊大吏列仙領班蘇軾敬跋太上道德經解後跋道德尊經乃洞眞祕典非至人莫能窺其奥非至義莫能闡其文人人皆知是經之義以靜爲本以虛爲用以無爲爲爲以無事事事運在玄牝妙在谷神而其實大無不包細無不入舉凡家國天下之要身心性命之本以至萬理萬事萬物萬殊皆莫踰焉是猶太極然範圍億天而不外任人各証境界自別千變萬化統於一極天地因之以運行日月因之以昭明時序因之以和順聖佛因之以統同任舉一義總含無量義此孚佑上帝所以於分疏之外又有闡義之作也昔觀音大士云道無名法卽道卽道卽法太上云專炁致柔此卽是正法得此法道在斯專者一也致者極也專一其炁動靜無紛則靜之又靜斯可致極於柔若少有不專則靜而不靜非柔而近於剛矣非道也非法也爾法子玄修須體此三昧宏教恩師云菩薩慈訓仙佛合乘此爲無上法語可卽此爲尊經注可卽此爲功修寶要知逐日講求只菩薩一爲點出經中一言便徹上徹下無妙不入斯眞師一義含無量義証也爰敬述之爲全經注腳廣化弟子惠覺謹誌太上道德經解後跋嘗攷古今注道德經者不下八百餘家然或空論義理或附合金丹要皆專主所見未能洞會本源夫太上爲大道之祖萬法之宗一切佛仙賢聖皆從此出正如日麗億天容光必照大者見大小者見小蓋自乾坤開肇而代代化身初三皇時爲萬法天師中三皇時號盤古先主又爲有古大先生后天皇伏羲時化身號鬱華子女媧氏時化身號鬱密子地皇神農時化身號大成子人皇軒轅時化身號廣成子少皞時化身號隨應子顓頊時化身號赤精子帝嚳時化身號錄圖子帝堯時化身號務成子帝舜時化身號尹夀子夏禹時化身號眞行子商湯時化身號錫則子特未有誕生之跡至商十八王陽甲十四年分神化㤅寄胎與玄妙玉女八十一載至商第二十二王武丁庚辰二月十五日卯時誕跡於楚之苦縣瀨鄉曲仁里母降左腋攀李指姓名耳字伯陽號曰老聃是爲后天老子在商湯爲守藏史在武王時爲柱下史至周昭王二十三年西出函谷關令尹喜留至福地著此五千言今得孚佑上帝逐句詮解妙徹玄微著字無多選言居要又得八祖合注理無不賅義無不貫平正通達一洗從前支離附會之說眞堪與經並垂萬古矣今同人共將全書宗正重加釐訂小子校繕是經謹跋識數語於簡末云純陽法嗣正化子恩洪敬跋
